<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python 读码补充训练</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --paper: #fff;
      --ink: #202936;
      --muted: #657386;
      --line: #dbe3ed;
      --soft: #edf3f8;
      --blue: #1f6f9f;
      --blue-dark: #15577e;
      --green: #247a5d;
      --green-soft: #e8f5ef;
      --red: #b34343;
      --red-soft: #fff0f0;
      --amber: #9a6518;
      --amber-soft: #fff5df;
      --code: #111923;
      --code-ink: #eaf2f8;
      --shadow: 0 16px 44px rgba(28, 43, 62, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.68;
    }
    button, textarea { font: inherit; }
    code, pre, textarea { font-family: Consolas, "Cascadia Code", "Courier New", monospace; }
    code { background: #e9eef5; border-radius: 5px; padding: 1px 5px; color: #213346; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 315px minmax(0, 1fr); }
    .side {
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      background: #fbfcfe; border-right: 1px solid var(--line); padding: 18px 16px;
    }
    .brand { padding: 6px 6px 16px; border-bottom: 1px solid var(--line); }
    .brand h1 { margin: 0; font-size: 21px; line-height: 1.25; letter-spacing: 0; }
    .brand p { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .meter { margin: 16px 6px; }
    .meter-row { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .meter-track { height: 8px; border-radius: 999px; background: #dfe7ef; overflow: hidden; }
    .meter-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .2s ease; }
    .note {
      margin: 16px 6px; padding: 12px; border-radius: 8px;
      background: var(--soft); color: #354254; font-size: 13px;
    }
    .nav-title { margin: 18px 6px 6px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .nav { display: grid; gap: 6px; }
    .nav-btn {
      width: 100%; border: 0; border-radius: 7px; background: transparent; color: var(--ink);
      display: grid; grid-template-columns: 28px 1fr auto; gap: 8px; align-items: center;
      padding: 8px; text-align: left; cursor: pointer;
    }
    .nav-btn:hover { background: var(--soft); }
    .nav-btn.active { background: #dcecf7; color: var(--blue-dark); font-weight: 700; }
    .nav-num {
      width: 24px; height: 24px; border-radius: 50%; background: #e4ebf2; color: #566579;
      display: grid; place-items: center; font-size: 12px; font-weight: 700;
    }
    .nav-btn.done .nav-num { background: var(--green-soft); color: var(--green); }
    .nav-kind { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .main { padding: 24px clamp(16px, 4vw, 46px) 52px; min-width: 0; }
    .hero { display: grid; gap: 10px; margin-bottom: 20px; }
    .kicker { margin: 0; color: var(--blue); font-weight: 700; font-size: 13px; }
    .hero h2 { margin: 0; font-size: clamp(26px, 3.2vw, 42px); line-height: 1.15; letter-spacing: 0; }
    .hero p { margin: 0; color: var(--muted); max-width: 980px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .btn {
      border: 1px solid var(--line); background: var(--paper); color: var(--ink);
      border-radius: 7px; padding: 8px 12px; cursor: pointer;
    }
    .btn:hover { border-color: #adc0d1; background: #f8fbff; }
    .btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; }
    .btn.green { border-color: var(--green); background: var(--green); color: #fff; }
    .grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(340px, .85fr); gap: 20px; align-items: start; }
    .panel { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .lesson { padding: clamp(18px, 3vw, 30px); }
    .practice { position: sticky; top: 20px; padding: 18px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tag {
      display: inline-flex; align-items: center; min-height: 25px; padding: 3px 10px; border-radius: 999px;
      background: #edf5fb; color: #285b7a; font-size: 12px; font-weight: 700;
    }
    .tag.green { background: var(--green-soft); color: var(--green); }
    .lesson h3, .practice h3 { margin: 18px 0 8px; font-size: 21px; line-height: 1.3; letter-spacing: 0; }
    .practice h3 { margin-top: 0; font-size: 18px; }
    .lesson h4 { margin: 15px 0 8px; font-size: 17px; letter-spacing: 0; }
    .lesson p, .lesson li, .practice p { color: #303b49; }
    .lesson ul, .lesson ol { padding-left: 22px; }
    .code {
      background: var(--code); color: var(--code-ink); border-radius: 8px; padding: 14px;
      overflow-x: auto; font-size: 14px; line-height: 1.55; white-space: pre;
    }
    .callout {
      margin: 16px 0; border-left: 4px solid var(--blue); background: #eef7fc;
      border-radius: 0 7px 7px 0; padding: 12px 14px;
    }
    .callout.warn { border-left-color: var(--amber); background: var(--amber-soft); }
    table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin: 14px 0; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 10px; text-align: left; vertical-align: top; }
    th { background: #edf2f7; }
    tr:last-child td { border-bottom: 0; }
    .explain-list { display: grid; gap: 8px; margin: 12px 0; }
    .explain-row {
      display: grid; grid-template-columns: minmax(160px, .4fr) minmax(0, 1fr);
      gap: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfdff; padding: 10px;
    }
    .explain-row strong { color: #213346; }
    .options { display: grid; gap: 8px; margin-top: 10px; }
    .option {
      border: 1px solid var(--line); background: #fbfdff; border-radius: 7px;
      padding: 10px 11px; cursor: pointer; text-align: left;
    }
    .option:hover { border-color: #aebed0; }
    .option.correct { background: var(--green-soft); border-color: #a8d7c3; }
    .option.wrong { background: var(--red-soft); border-color: #e0b0b0; }
    .editor {
      width: 100%; min-height: 185px; resize: vertical; border: 1px solid #b8c6d6; border-radius: 8px;
      background: var(--code); color: var(--code-ink); padding: 12px; font-size: 14px; line-height: 1.5;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .feedback, .hint, .answer {
      border: 1px solid var(--line); background: #f3f6f9; color: #354254;
      border-radius: 7px; padding: 10px 12px; min-height: 42px;
    }
    .feedback.good { background: var(--green-soft); border-color: #a8d7c3; color: var(--green); }
    .feedback.bad { background: var(--red-soft); border-color: #e0b0b0; color: var(--red); }
    .hint, .answer { display: none; margin-top: 10px; }
    .footer-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--line); }
    @media (max-width: 1040px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
      .practice { position: static; }
    }
    @media (max-width: 640px) {
      .main { padding: 18px 12px 36px; }
      .nav { grid-template-columns: 1fr; }
      .explain-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand">
        <h1>Python 读码补充训练</h1>
        <p>按“讲解-实例-拆解-选择题-手写练习”的节奏补齐工程化知识。</p>
      </div>
      <div class="meter">
        <div class="meter-row"><span>完成关卡</span><strong id="progressText">0 / 0</strong></div>
        <div class="meter-track"><div class="meter-fill" id="progressFill"></div></div>
      </div>
      <div class="note">
        这份是补充训练，不替代 4 小时基础课。卡住就看提示，重点是以后读源码时能认出来。
      </div>
      <div id="navRoot"></div>
    </aside>

    <main class="main">
      <section class="hero">
        <p class="kicker" id="lessonKicker">补充训练</p>
        <h2 id="lessonTitle">加载中</h2>
        <p id="lessonGoal"></p>
        <div class="toolbar">
          <button class="btn" id="prevBtn" type="button">上一关</button>
          <button class="btn primary" id="nextBtn" type="button">下一关</button>
          <button class="btn green" id="doneBtn" type="button">我理解了</button>
          <button class="btn" id="resetBtn" type="button">重置进度</button>
        </div>
      </section>

      <section class="grid">
        <article class="panel lesson">
          <div class="tags" id="tagRoot"></div>
          <div id="contentRoot"></div>
          <div class="footer-nav">
            <button class="btn" id="prevBtn2" type="button">上一关</button>
            <button class="btn primary" id="nextBtn2" type="button">下一关</button>
          </div>
        </article>
        <aside class="panel practice">
          <div id="practiceRoot"></div>
        </aside>
      </section>
    </main>
  </div>

  <script>
    const modules = [
      { name: "工程读码符号", lessons: [0, 1, 2, 3, 4, 5] },
      { name: "字符串、正则、数据转换", lessons: [6, 7, 8, 9, 10, 11] },
      { name: "HTTP、命令行、并发", lessons: [12, 13, 14, 15, 16, 17] },
      { name: "类结构和项目复盘", lessons: [18, 19, 20, 21, 22, 23] }
    ];

    const lessons = [
      {
        title: "文档字符串和注释",
        kind: "doc",
        tags: ["docstring", "注释", "读函数"],
        goal: "能区分注释、文件说明、函数说明，并知道读源码时先看它们。",
        concept: `
          <p>注释和文档字符串都不是给机器做计算用的，而是给人读代码用的。<code>#</code> 是普通注释；三引号字符串如果放在文件、类、函数开头，通常就是文档字符串。</p>
          <p>读陌生代码时，先看 docstring，能快速知道这个文件或函数承担什么角色。</p>
        `,
        example: `"""USB-6363 API 的客户端工具。"""\n\n# 默认连接本机服务\nDEFAULT_BASE_URL = "http://127.0.0.1:8765"\n\n\ndef health(self):\n    """检查服务是否正在运行。"""\n    return self._get("/health")`,
        breakdown: [
          ["文件顶部三引号", "说明整个文件的用途。"],
          ["# 默认连接本机服务", "普通注释，只给人看。"],
          ["函数里的三引号", "说明 health 这个函数做什么。"],
          ["return self._get(...)", "这才是真正执行的代码。"]
        ],
        quiz: {
          prompt: "docstring 的主要作用是什么？",
          options: [["解释文件、类或函数的用途", true], ["让代码自动运行更快", false], ["替代 return", false]],
          explain: "docstring 是说明文字，不负责执行逻辑。"
        },
        practice: {
          title: "给函数加说明",
          task: "写一个 health 函数，函数第一行放 docstring：检查服务。",
          starter: "def health():\n    ",
          checks: [
            ["def\\s+health\\s*\\(\\s*\\)\\s*:", "需要定义 def health():。"],
            ["[\"']{3}检查服务[\"']{3}", "函数体第一部分需要三引号 docstring：检查服务。"]
          ],
          hint: "三引号字符串要缩进在函数里面。",
          answer: "def health():\n    \"\"\"检查服务\"\"\"\n    return True"
        }
      },
      {
        title: "复杂类型提示",
        kind: "typing",
        tags: ["类型提示", "Any", "None"],
        goal: "把 dict[str, Any]、A | None、float | list[float] 翻译成人话。",
        concept: `
          <p>类型提示不是运行魔法，主要是帮人和编辑器理解输入输出。项目里常见的是“容器类型”和“可能是多种类型”。</p>
          <table><tr><th>写法</th><th>读法</th></tr><tr><td><code>dict[str, Any]</code></td><td>键是字符串，值可以是各种类型。</td></tr><tr><td><code>dict[str, Any] | None</code></td><td>要么是字典，要么是 None。</td></tr><tr><td><code>float | list[float]</code></td><td>要么一个小数，要么一串小数。</td></tr></table>
        `,
        example: `def _get(self, path: str, params: dict[str, Any] | None = None) -> dict[str, Any]:\n    ...`,
        breakdown: [
          ["path: str", "path 应该是字符串。"],
          ["params: dict[str, Any] | None", "params 可以是字典，也可以没有。"],
          ["= None", "默认没有参数。"],
          ["-> dict[str, Any]", "函数预计返回字典。"]
        ],
        quiz: {
          prompt: "dict[str, Any] | None 表示什么？",
          options: [["字典或 None", true], ["只能是字符串", false], ["一定是列表", false]],
          explain: "| 在类型提示里可以读成“或者”。"
        },
        practice: {
          title: "补一个类型提示",
          task: "写函数头：def decode(raw: bytes) -> dict[str, Any]:",
          starter: "",
          checks: [
            ["def\\s+decode\\s*\\(\\s*raw\\s*:\\s*bytes\\s*\\)\\s*->\\s*dict\\s*\\[\\s*str\\s*,\\s*Any\\s*\\]\\s*:", "需要写出指定函数头。"]
          ],
          hint: "照题目写函数头即可，不需要函数体也能过检查。",
          answer: "def decode(raw: bytes) -> dict[str, Any]:\n    pass"
        }
      },
      {
        title: "对象属性和 __dict__",
        kind: "object",
        tags: ["属性", "__dict__", "JSON"],
        goal: "知道对象.属性是什么，以及为什么项目里用 device.__dict__。",
        concept: `
          <p>对象属性就是挂在对象身上的变量。<code>device.name</code> 读取设备对象的 name 属性。<code>__dict__</code> 常能把对象属性拿成一个字典，方便转 JSON。</p>
        `,
        example: `devices = [device.__dict__ for device in controller.list_devices()]\nself._send_json({"devices": devices})`,
        breakdown: [
          ["controller.list_devices()", "得到一组 DeviceInfo 对象。"],
          ["device.__dict__", "把一个对象的属性变成字典。"],
          ["[... for device in ...]", "对每个设备都做一次转换。"],
          ["_send_json", "把字典形式的数据发给客户端。"]
        ],
        quiz: {
          prompt: "device.__dict__ 在这里主要是为了什么？",
          options: [["把对象变成更容易转 JSON 的字典", true], ["删除设备", false], ["启动硬件任务", false]],
          explain: "JSON 更容易处理 dict/list/str/number/bool 这类基础数据。"
        },
        practice: {
          title: "把对象列表转字典列表",
          task: "写一行列表推导式：items = [item.__dict__ for item in objects]",
          starter: "objects = []\n",
          checks: [
            ["items\\s*=\\s*\\[\\s*item\\.__dict__\\s+for\\s+item\\s+in\\s+objects\\s*\\]", "需要 items = [item.__dict__ for item in objects]。"]
          ],
          hint: "结构和 devices 那行一样，只是变量名换了。",
          answer: "objects = []\nitems = [item.__dict__ for item in objects]"
        }
      },
      {
        title: "下划线开头的方法",
        kind: "style",
        tags: ["内部方法", "约定", "API"],
        goal: "知道 _get、_post、_normalize_channel 这类名字通常不是普通入口。",
        concept: `
          <p>单下划线开头是 Python 社区常见约定：这个名字主要给模块或类内部用。它不是语法禁止，但读代码时要知道它不是推荐的公开入口。</p>
        `,
        example: `def read_ai(self, channel="ai0"):\n    return self._get("/api/ai/read", {"channel": channel})`,
        breakdown: [
          ["read_ai", "公开方法，普通脚本应该调用它。"],
          ["_get", "内部辅助方法，负责 HTTP GET。"],
          ["return self._get(...)", "公开方法把实际网络请求委托给内部方法。"]
        ],
        quiz: {
          prompt: "普通实验脚本更应该调用哪个？",
          options: [["daq.read_ai(channel=\"ai0\")", true], ["daq._get(...)", false]],
          explain: "read_ai 是公开接口，_get 是内部实现细节。"
        },
        practice: {
          title: "写一个公开方法调用内部方法",
          task: "写方法 get_device(self)，返回 self._get('/api/device')。",
          starter: "def get_device(self):\n    ",
          checks: [
            ["def\\s+get_device\\s*\\(\\s*self\\s*\\)\\s*:", "需要 def get_device(self):。"],
            ["return\\s+self\\._get\\s*\\(\\s*[\"']/api/device[\"']\\s*\\)", "需要 return self._get(\"/api/device\")。"]
          ],
          hint: "这是一段类里面的方法，不需要写完整 class。",
          answer: "def get_device(self):\n    return self._get(\"/api/device\")"
        }
      },
      {
        title: "*args 和 **kwargs",
        kind: "params",
        tags: ["参数", "*args", "**kwargs"],
        goal: "能读懂函数接收任意位置参数和任意关键字参数。",
        concept: `
          <p><code>*args</code> 接收多余的位置参数，形成 tuple；<code>**kwargs</code> 接收多余的关键字参数，形成 dict。项目里更常见的是下一节的 <code>**字典展开</code>，但先知道这套概念会更稳。</p>
        `,
        example: `def show(*args, **kwargs):\n    print(args)\n    print(kwargs)\n\nshow(1, 2, channel="ai0", samples=10)`,
        breakdown: [
          ["1, 2", "进入 args，变成 (1, 2)。"],
          ["channel='ai0'", "进入 kwargs 字典。"],
          ["samples=10", "也进入 kwargs 字典。"]
        ],
        quiz: {
          prompt: "show(channel='ai0') 中 channel 会进入哪里？",
          options: [["kwargs", true], ["args", false], ["函数名", false]],
          explain: "带名字的参数是关键字参数，会被 **kwargs 接住。"
        },
        practice: {
          title: "写一个接收 kwargs 的函数",
          task: "定义 show_config(**kwargs)，打印 kwargs。",
          starter: "",
          checks: [
            ["def\\s+show_config\\s*\\(\\s*\\*\\*kwargs\\s*\\)\\s*:", "需要 def show_config(**kwargs):。"],
            ["print\\s*\\(\\s*kwargs\\s*\\)", "需要 print(kwargs)。"]
          ],
          hint: "两个星号写在 kwargs 前面。",
          answer: "def show_config(**kwargs):\n    print(kwargs)"
        }
      },
      {
        title: "**字典展开",
        kind: "params",
        tags: ["**dict", "参数展开", "server"],
        goal: "看懂 controller.read_ai_voltage(**_ai_args(query))。",
        concept: `
          <p><code>**字典</code> 会把字典展开成关键字参数。这是 server 层把 HTTP 参数交给 core 层的关键写法。</p>
        `,
        example: `args = {"channel": "ai0", "samples": 1}\ncontroller.read_ai_voltage(**args)`,
        breakdown: [
          ["args", "一个普通字典。"],
          ["**args", "把字典展开。"],
          ["read_ai_voltage(channel='ai0', samples=1)", "展开后的等价调用。"]
        ],
        quiz: {
          prompt: "func(**{'x': 1, 'y': 2}) 等价于什么？",
          options: [["func(x=1, y=2)", true], ["func({'x': 1, 'y': 2})", false], ["func(**x, **y)", false]],
          explain: "** 会把字典键值对变成关键字参数。"
        },
        practice: {
          title: "展开 args",
          task: "给定 args，调用 read_ai(**args)。",
          starter: "args = {\"channel\": \"ai0\", \"samples\": 1}\n",
          checks: [
            ["read_ai\\s*\\(\\s*\\*\\*args\\s*\\)", "需要 read_ai(**args)。"]
          ],
          hint: "两个星号直接放在 args 前面。",
          answer: "args = {\"channel\": \"ai0\", \"samples\": 1}\nread_ai(**args)"
        }
      },
      {
        title: "正则表达式",
        kind: "regex",
        tags: ["re", "通道校验", "字符串规则"],
        goal: "知道项目里的正则是用来检查和提取通道名。",
        concept: `
          <p>正则表达式是一种字符串规则。项目里用它判断 <code>ai0</code>、<code>Dev2/ai0</code>、<code>PFI0</code>、<code>port0/line0</code> 这种名字是否合法。</p>
        `,
        example: `_AI_RE = re.compile(r"^(?:(?P&lt;device&gt;Dev\\d+)/)?ai(?P&lt;index&gt;\\d+)$")\nmatch = _AI_RE.match("Dev2/ai0")`,
        breakdown: [
          ["^ 和 $", "要求从开头匹配到结尾。"],

        `,
        example: `ai_result = daq.read_ai(channel="ai0")`,
        breakdown: [

          ],

    let current = Number(localStorage.getItem("supplement2.current") || 0);
    const done = new Set(JSON.parse(localStorage.getItem("supplement2.done") || "[]"));

    const navRoot = document.getElementById("navRoot");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const lessonKicker = document.getElementById("lessonKicker");
    const lessonTitle = document.getElementById("lessonTitle");
    const lessonGoal = document.getElementById("lessonGoal");
    const tagRoot = document.getElementById("tagRoot");
    const contentRoot = document.getElementById("contentRoot");
    const practiceRoot = document.getElementById("practiceRoot");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn2 = document.getElementById("prevBtn2");
    const nextBtn2 = document.getElementById("nextBtn2");
    const doneBtn = document.getElementById("doneBtn");
    const resetBtn = document.getElementById("resetBtn");

    function save() {
      localStorage.setItem("supplement2.current", String(current));
      localStorage.setItem("supplement2.done", JSON.stringify([...done]));
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderNav() {
      navRoot.innerHTML = modules.map((mod) => {
        const buttons = mod.lessons.map((idx) => {
          const lesson = lessons[idx];
          const active = idx === current;
          const isDone = done.has(idx);
          return `
            <button class="nav-btn ${active ? "active" : ""} ${isDone ? "done" : ""}" type="button" data-index="${idx}">
              <span class="nav-num">${isDone ? "✓" : idx + 1}</span>
              <span>${lesson.title}</span>
              <span class="nav-kind">${lesson.kind}</span>
            </button>
          `;
        }).join("");
        return `<div class="nav-title">${mod.name}</div><nav class="nav">${buttons}</nav>`;
      }).join("");
      navRoot.querySelectorAll(".nav-btn").forEach((button) => {
        button.addEventListener("click", () => {
          current = Number(button.dataset.index);
          save();
          render();
        });
      });
    }

    function renderProgress() {
      progressText.textContent = `${done.size} / ${lessons.length}`;
      progressFill.style.width = `${Math.round((done.size / lessons.length) * 100)}%`;
    }

    function renderQuiz(lesson) {
      const q = lesson.quiz;
      return `
        <h3>概念选择题</h3>
        <p>${q.prompt}</p>
        <div class="options">
          ${q.options.map((option) => `
            <button class="option" type="button" data-correct="${option[1]}">${option[0]}</button>
          `).join("")}
        </div>
        <div class="feedback" id="quizFeedback" style="margin-top:10px;">先选一个答案。</div>
      `;
    }

    function renderPractice(lesson) {
      const p = lesson.practice;
      practiceRoot.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.task}</p>
        <textarea class="editor" id="editor" spellcheck="false">${p.starter}</textarea>
        <div class="actions">
          <button class="btn green" id="checkBtn" type="button">检查代码</button>
          <button class="btn" id="hintBtn" type="button">提示</button>
          <button class="btn" id="answerBtn" type="button">参考答案</button>
        </div>
        <div class="feedback" id="practiceFeedback">写一两行代码，然后点击检查。</div>
        <div class="hint" id="hintBox">${p.hint}</div>
        <div class="answer" id="answerBox"><strong>一种参考写法：</strong><pre class="code">${escapeHtml(p.answer)}</pre></div>
      `;
      document.getElementById("checkBtn").addEventListener("click", () => {
        const code = document.getElementById("editor").value;
        const failed = p.checks.find(([pattern]) => !(new RegExp(pattern, "s").test(code)));
        const feedback = document.getElementById("practiceFeedback");
        if (failed) {
          feedback.className = "feedback bad";
          feedback.textContent = failed[1];
          return;
        }
        done.add(current);
        save();
        renderProgress();
        renderNav();
        doneBtn.textContent = "已完成";
        feedback.className = "feedback good";
        feedback.textContent = "通过。这一节的读码点已经抓住了。";
      });
      document.getElementById("hintBtn").addEventListener("click", () => {
        const box = document.getElementById("hintBox");
        box.style.display = box.style.display === "block" ? "none" : "block";
      });
      document.getElementById("answerBtn").addEventListener("click", () => {
        const box = document.getElementById("answerBox");
        box.style.display = box.style.display === "block" ? "none" : "block";
      });
    }

    function bindQuiz(lesson) {
      document.querySelectorAll(".option").forEach((button) => {
        button.addEventListener("click", () => {
          const isCorrect = button.dataset.correct === "true";
          document.querySelectorAll(".option").forEach((option) => {
            option.classList.remove("wrong", "correct");
            if (option.dataset.correct === "true") option.classList.add("correct");
          });
          if (!isCorrect) button.classList.add("wrong");
          const feedback = document.getElementById("quizFeedback");
          feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
          feedback.textContent = isCorrect ? `答对了。${lesson.quiz.explain}` : `再看一眼实例拆解。${lesson.quiz.explain}`;
        });
      });
    }

    function render() {
      const lesson = lessons[current];
      lessonKicker.textContent = `补充第 ${current + 1} 关 / 共 ${lessons.length} 关`;
      lessonTitle.textContent = lesson.title;
      lessonGoal.textContent = lesson.goal;
      tagRoot.innerHTML = lesson.tags.map((tag, idx) => `<span class="tag ${idx % 2 ? "green" : ""}">${tag}</span>`).join("");
      contentRoot.innerHTML = `
        <h3>基础知识讲解</h3>
        ${lesson.concept}
        <h3>实例</h3>
        <pre class="code">${escapeHtml(lesson.example)}</pre>
        <h3>实例中的具体内容说明</h3>
        <div class="explain-list">
          ${lesson.breakdown.map((row) => `
            <div class="explain-row"><strong>${escapeHtml(row[0])}</strong><span>${row[1]}</span></div>
          `).join("")}
        </div>
        ${renderQuiz(lesson)}
      `;
      renderPractice(lesson);
      bindQuiz(lesson);
      renderNav();
      renderProgress();
      prevBtn.disabled = current === 0;
      prevBtn2.disabled = current === 0;
      nextBtn.disabled = current === lessons.length - 1;
      nextBtn2.disabled = current === lessons.length - 1;
      doneBtn.textContent = done.has(current) ? "已完成" : "我理解了";
    }

    function go(delta) {
      const next = current + delta;
      if (next < 0 || next >= lessons.length) return;
      current = next;
      save();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    prevBtn.addEventListener("click", () => go(-1));
    prevBtn2.addEventListener("click", () => go(-1));
    nextBtn.addEventListener("click", () => go(1));
    nextBtn2.addEventListener("click", () => go(1));
    doneBtn.addEventListener("click", () => {
      done.add(current);
      save();
      render();
    });
    resetBtn.addEventListener("click", () => {
      if (!confirm("确定重置补充训练进度吗？")) return;
      done.clear();
      current = 0;
      save();
      render();
    });

    render();
  </script>
</body>
