<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双峰波形查看器</title>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --line: #d7dde5;
    --text: #17202a;
    --muted: #697586;
    --blue: #1f6feb;
    --green: #16833a;
    --red: #c62828;
    --amber: #9a6700;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
    height: 100vh;
    display: grid;
    grid-template-columns: 360px 1fr;
    overflow: hidden;
  }
  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 12px;
    overflow: auto;
  }
  main {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
    padding: 12px;
  }
  h1 { font-size: 18px; margin: 0 0 12px; }
  h2 {
    font-size: 14px;
    margin: 18px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 8px 0 4px;
  }
  input, select, button {
    width: 100%;
    font: inherit;
    font-size: 13px;
  }
  input, select {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 8px;
    background: #fff;
    color: var(--text);
  }
  input[type="checkbox"] {
    width: auto;
    margin-right: 7px;
  }
  button {
    border: 0;
    border-radius: 6px;
    padding: 8px 10px;
    background: var(--blue);
    color: white;
    font-weight: 650;
    cursor: pointer;
  }
  button.secondary { background: #59636f; }
  button.green { background: var(--green); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .inline {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    color: var(--text);
    font-size: 13px;
  }
  .status {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .status.error { color: var(--red); }
  .status.ok { color: var(--green); }
  .plots {
    display: grid;
    gap: 10px;
    min-height: 0;
    overflow: auto;
    grid-auto-rows: minmax(220px, 1fr);
  }
  .plot {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .plot-title {
    position: absolute;
    left: 10px;
    top: 8px;
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 12px;
    color: var(--muted);
    z-index: 2;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    text-align: right;
    border-bottom: 1px solid var(--line);
    padding: 6px 4px;
  }
  th:first-child, td:first-child { text-align: left; }
  .footer {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
  }
  .mono { font-family: Consolas, "SFMono-Regular", monospace; }
</style>
</head>
<body>
<aside>
  <h1>双峰波形查看器</h1>

  <h2>默认值</h2>
  <div class="actions">
    <button class="secondary" onclick="saveDefaults()">保存为默认值</button>
    <button class="secondary" onclick="resetDefaults()">恢复出厂默认</button>
  </div>

  <h2>采集</h2>
  <label>AI 通道，逗号分隔</label>
  <input id="channels" value="ai0, ai1">
  <div class="grid2">
    <div>
      <label>采样率 / Hz</label>
      <input id="rate" type="number" value="50000" step="1000">
    </div>
    <div>
      <label>每通道点数</label>
      <input id="samples" type="number" value="5000" step="100">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>接线方式</label>
      <select id="terminal_config">
        <option value="DIFF">DIFF</option>
        <option value="RSE">RSE</option>
        <option value="NRSE">NRSE</option>
      </select>
    </div>
    <div>
      <label>超时 / s</label>
      <input id="timeout" type="number" value="10" step="1">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>AI 最小值 / V</label>
      <input id="min_val" type="number" value="-5" step="0.5">
    </div>
    <div>
      <label>AI 最大值 / V</label>
      <input id="max_val" type="number" value="5" step="0.5">
    </div>
  </div>

  <h2>PFI 硬件触发</h2>
  <label class="inline"><input id="trigger_enabled" type="checkbox"> 等待 PFI 边沿后开始采集</label>
  <div class="grid2">
    <div>
      <label>触发源</label>
      <input id="trigger_source" value="PFI0">
    </div>
    <div>
      <label>触发边沿</label>
      <select id="trigger_edge">
        <option value="RISING">RISING</option>
        <option value="FALLING">FALLING</option>
      </select>
    </div>
  </div>
  <label>PFI 重新对齐间隔 / 帧，0 表示关闭</label>
  <input id="resync_every_frames" type="number" value="0" min="0" step="1">

  <div class="actions">
    <button id="captureBtn" onclick="captureFrame()">抓取最新帧</button>
    <button class="green" id="saveBtn" onclick="saveFrame()" disabled>保存样本</button>
  </div>

  <h2>历史样本</h2>
  <select id="saved_samples"></select>
  <div class="actions">
    <button class="secondary" onclick="refreshSavedSamples()">刷新列表</button>
    <button class="secondary" onclick="loadSavedSample()">加载样本</button>
  </div>

  <h2>连续采集</h2>
  <input id="stream_source" type="hidden" value="unified_stream">
  <div class="grid2">
    <div>
      <label>连续状态</label>
      <input id="stream_status" value="停止" readonly>
    </div>
    <div>
      <label>最新帧编号</label>
      <input id="stream_frame_id" value="0" readonly>
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>每帧时长 / ms</label>
      <input id="frame_duration_ms" value="--" readonly>
    </div>
    <div>
      <label>帧率 / Hz</label>
      <input id="frame_rate_hz" value="--" readonly>
    </div>
  </div>
  <div class="actions">
    <button class="green" id="streamStartBtn" onclick="startBackendStream()">开始连续采集</button>
    <button class="secondary" id="streamStopBtn" onclick="stopBackendStream()" disabled>停止连续采集</button>
  </div>

  <h2>视图</h2>
  <div class="grid2">
    <div>
      <label>X 起点索引</label>
      <input id="x_start" type="number" value="" placeholder="自动">
    </div>
    <div>
      <label>X 终点索引</label>
      <input id="x_end" type="number" value="" placeholder="自动">
    </div>
  </div>
  <div class="actions">
    <button class="secondary" onclick="applyXView()">应用范围</button>
    <button class="secondary" onclick="resetXView()">显示全帧</button>
  </div>

  <h2>手动选峰</h2>
  <label>点击波形时设置</label>
  <select id="pick_target">
    <option value="0">P1</option>
    <option value="1">P2</option>
    <option value="area_left">面积左零点</option>
    <option value="area_right">面积右零点</option>
    <option value="area2_left">面积 B 左零点</option>
    <option value="area2_right">面积 B 右零点</option>
  </select>
  <div class="grid2">
    <div>
      <label>P1 索引</label>
      <input id="peak0" type="number" value="642" step="1">
    </div>
    <div>
      <label>P2 索引</label>
      <input id="peak1" type="number" value="754" step="1">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>面积左零点</label>
      <input id="manual_area_left" type="number" value="" step="1" placeholder="点击或手填">
    </div>
    <div>
      <label>面积右零点</label>
      <input id="manual_area_right" type="number" value="" step="1" placeholder="点击或手填">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>面积 B 左零点</label>
      <input id="manual_area2_left" type="number" value="" step="1" placeholder="点击或手填">
    </div>
    <div>
      <label>面积 B 右零点</label>
      <input id="manual_area2_right" type="number" value="" step="1" placeholder="点击或手填">
    </div>
  </div>

  <h2>测峰参数</h2>
  <div class="grid2">
    <div>
      <label>分析通道序号</label>
      <input id="analysis_channel_index" type="number" value="0" step="1">
    </div>
    <div>
      <label>测峰模式</label>
      <select id="peak_mode">
        <option value="height">height</option>
        <option value="area">area</option>
      </select>
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>平滑窗口</label>
      <input id="smooth_window" type="number" value="25" step="2">
    </div>
    <div>
      <label>搜索半宽</label>
      <input id="search_window_half" type="number" value="20" step="1">
    </div>
  </div>
  <label>测量半宽</label>
  <input id="measure_half" type="number" value="5" step="1">
  <div class="actions">
    <button class="secondary" onclick="measurePeaks()">重新测峰</button>
    <button class="secondary" onclick="clearPeaks()">清空标记</button>
  </div>

  <h2>结果</h2>
  <table>
    <thead><tr><th>峰</th><th>索引</th><th>测量值</th><th>窗口</th></tr></thead>
    <tbody id="peakRows">
      <tr><td>P1</td><td>--</td><td>--</td><td>--</td></tr>
      <tr><td>P2</td><td>--</td><td>--</td><td>--</td></tr>
    </tbody>
  </table>
  <h2>手动面积</h2>
  <table>
    <tbody id="manualAreaRows">
      <tr><td>面积</td><td>--</td></tr>
      <tr><td>最近抖动</td><td>--</td></tr>
    </tbody>
  </table>
  <h2>双面积统计</h2>
  <table>
    <thead><tr><th>窗口</th><th>范围</th><th>当前</th><th>最近均值/标准差</th></tr></thead>
    <tbody id="dualAreaRows">
      <tr><td>A</td><td>--</td><td>--</td><td>--</td></tr>
      <tr><td>B</td><td>--</td><td>--</td><td>--</td></tr>
    </tbody>
  </table>
  <h2>双峰高统计（慢漂记录）</h2>
  <table>
    <thead><tr><th>窗口</th><th>峰顶索引</th><th>当前峰高</th><th>最近均值/标准差/EMA</th></tr></thead>
    <tbody id="dualPeakHeightRows">
      <tr><td>A</td><td>--</td><td>--</td><td>--</td></tr>
      <tr><td>B</td><td>--</td><td>--</td><td>--</td></tr>
    </tbody>
  </table>

  <h2>慢漂记录</h2>
  <div class="grid2">
    <div>
      <label>统计窗口 / 帧</label>
      <input id="trend_window_frames" type="number" value="200" min="2" step="1">
    </div>
    <div>
      <label>记录频率 / Hz</label>
      <input id="trend_record_hz" type="number" value="1" min="0.01" step="0.5">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>自动停止 / min，0 表示不限时</label>
      <input id="trend_duration_minutes" type="number" value="120" min="0" step="10">
    </div>
    <div>
      <label>已运行 / 剩余</label>
      <input id="trend_time_status" value="--" readonly>
    </div>
  </div>
  <label>面积和峰高 EMA alpha，0 表示关闭滤波</label>
  <input id="trend_ema_alpha" type="number" value="0.02" min="0" max="1" step="0.005">
  <label class="inline">
    <input id="auto_track_enabled" type="checkbox">
    自动跟随面积窗口内最高点
  </label>
  <div class="grid2">
    <div>
      <label>跟随平滑窗口 / 点</label>
      <input id="auto_track_smooth_window" type="number" value="9" min="1" step="2">
    </div>
    <div>
      <label>每帧最大移动 / 点</label>
      <input id="auto_track_max_shift" type="number" value="5" min="0" step="1">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>记录状态</label>
      <input id="trend_status" value="停止" readonly>
    </div>
    <div>
      <label>已写行数</label>
      <input id="trend_records" value="0" readonly>
    </div>
  </div>
  <label>CSV 文件</label>
  <input id="trend_file" value="" readonly>
  <label>最新统计</label>
  <input id="trend_latest" value="--" readonly>

  <h2>逐帧窗口电压（临时测试）</h2>
  <label>记录窗口</label>
  <select id="window_voltage_mode">
    <option value="none" selected>不记录</option>
    <option value="a">仅窗口 A</option>
    <option value="b">仅窗口 B</option>
    <option value="both">窗口 A+B</option>
  </select>
  <label>NPZ 输出目录</label>
  <input id="window_voltage_output_dir" value="data/two_peak_window_voltage">
  <div class="grid2">
    <div>
      <label>写盘状态</label>
      <input id="window_voltage_status" value="关闭" readonly>
    </div>
    <div>
      <label>数据量估计</label>
      <input id="window_voltage_estimate" value="--" readonly>
    </div>
  </div>
  <label>记录进度</label>
  <input id="window_voltage_progress" value="--" readonly>
  <label>记录目录</label>
  <input id="window_voltage_directory" value="" readonly>
  <div class="plot" style="height:160px; margin-top:8px;">
    <canvas id="areaTrendCanvas"></canvas>
  </div>
  <div class="plot" style="height:160px; margin-top:8px;">
    <canvas id="peakHeightTrendCanvas"></canvas>
  </div>
  <div class="actions">
    <button class="green" id="trendStartBtn" onclick="startAreaTrend()">开始慢漂记录</button>
    <button class="secondary" id="trendStopBtn" onclick="stopAreaTrend()" disabled>停止慢漂记录</button>
  </div>

  <h2>临时同步测试</h2>
  <label>功率慢漂服务</label>
  <input id="sync_power_api_url" value="http://127.0.0.1:8767">
  <div class="grid2">
    <div>
      <label>功率端预备</label>
      <input id="sync_power_armed" value="未连接" readonly>
    </div>
    <div>
      <label>同步状态</label>
      <input id="sync_status" value="停止" readonly>
    </div>
  </div>
  <label>Session ID</label>
  <input id="sync_session_id" value="" readonly>
  <label>同步清单</label>
  <input id="sync_manifest_file" value="" readonly>
  <div class="actions">
    <button class="green" id="syncStartBtn" onclick="startSyncTest()">同步开始功率与窗口记录</button>
    <button class="secondary" id="syncStopBtn" onclick="stopSyncTest()" disabled>同步停止</button>
  </div>

  <h2>AO 扫描标定</h2>
  <div class="grid2">
    <div>
      <label>AO 通道</label>
      <input id="ao_scan_channel" value="ao0">
    </div>
    <div>
      <label>测量字段</label>
      <select id="ao_scan_measure_field">
        <option value="area_ema">area_ema</option>
        <option value="area_mean">area_mean</option>
        <option value="area2_ema">area2_ema</option>
        <option value="area2_mean">area2_mean</option>
        <option value="area_sum_ema" selected>area_sum_ema</option>
        <option value="area_sum_mean">area_sum_mean</option>
      </select>
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>起始电压 / V</label>
      <input id="ao_scan_start_voltage" type="number" value="0" step="0.01">
    </div>
    <div>
      <label>终止电压 / V</label>
      <input id="ao_scan_stop_voltage" type="number" value="1" step="0.01">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>步长 / V</label>
      <input id="ao_scan_step_voltage" type="number" value="0.05" step="0.01">
    </div>
    <div>
      <label>结束恢复电压 / V，留空则保持</label>
      <input id="ao_scan_restore_voltage" type="number" value="" step="0.01" placeholder="保持最后电压">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>AO 最小值 / V</label>
      <input id="ao_scan_min_val" type="number" value="-10" step="0.1">
    </div>
    <div>
      <label>AO 最大值 / V</label>
      <input id="ao_scan_max_val" type="number" value="10" step="0.1">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>改电压后等待 / s</label>
      <input id="ao_scan_settle_s" type="number" value="0.5" min="0" step="0.1">
    </div>
    <div>
      <label>每点测量时间 / s</label>
      <input id="ao_scan_dwell_s" type="number" value="2" min="0.1" step="0.1">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>扫描状态</label>
      <input id="ao_scan_status" value="停止" readonly>
    </div>
    <div>
      <label>已完成点数</label>
      <input id="ao_scan_points" value="0" readonly>
    </div>
  </div>
  <label>标定 CSV 文件</label>
  <input id="ao_scan_file" value="" readonly>
  <label>最新标定点</label>
  <input id="ao_scan_latest" value="--" readonly>
  <div class="plot" style="height:160px; margin-top:8px;">
    <canvas id="aoScanCanvas"></canvas>
  </div>
  <div class="actions">
    <button class="green" id="aoScanStartBtn" onclick="startAoScan()">开始 AO 扫描</button>
    <button class="secondary" id="aoScanStopBtn" onclick="stopAoScan()" disabled>停止 AO 扫描</button>
  </div>

  <h2>单路 AO 诊断</h2>
  <div class="grid2">
    <div>
      <label>AO 通道</label>
      <input id="ao_test_channel" value="ao0">
    </div>
    <div>
      <label>输出电压 / V</label>
      <input id="ao_test_value" type="number" value="2.0" step="0.01">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>最小电压 / V</label>
      <input id="ao_test_min" type="number" value="-10.0" step="0.1">
    </div>
    <div>
      <label>最大电压 / V</label>
      <input id="ao_test_max" type="number" value="10.0" step="0.1">
    </div>
  </div>
  <div class="actions">
    <button class="secondary" onclick="writeAoTest()">写入单路 AO</button>
  </div>

  <h2>双路功率锁定参数</h2>
  <div class="grid2">
    <label><input id="lock_eom_enabled" type="checkbox" checked> 启用 EOM 路</label>
    <label><input id="lock_aom_enabled" type="checkbox" checked> 启用 AOM 路</label>
  </div>
  <div class="grid2">
    <div>
      <label>EOM AO 通道</label>
      <input id="lock_eom_channel" value="ao0">
    </div>
    <div>
      <label>EOM 反馈字段</label>
      <select id="lock_eom_feedback">
        <option value="area_ema" selected>area_ema</option>
        <option value="area_mean">area_mean</option>
      </select>
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>EOM 目标面积</label>
      <input id="lock_eom_target" type="number" value="4.7" step="0.01">
    </div>
    <div>
      <label>EOM 初始电压 / V</label>
      <input id="lock_eom_initial" type="number" value="2.0" step="0.01">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>EOM 最小电压 / V</label>
      <input id="lock_eom_min" type="number" value="1.0" step="0.01">
    </div>
    <div>
      <label>EOM 最大电压 / V</label>
      <input id="lock_eom_max" type="number" value="3.5" step="0.01">
    </div>
  </div>
  <div class="grid2">
    <div>

function setStatus(text, kind) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (kind ? ' ' + kind : '');
}

async function postJson(path, body) {
  const response = await fetch(path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await response.json();
  if (!response.ok || data.ok === false) {
    throw new Error(data.error || '请求失败');
  }
  return data;
}

async function loadDefaults() {
  try {
    const response = await fetch('/api/defaults');
    const defaults = await response.json();
    if (!response.ok || defaults.ok === false) {
      throw new Error(defaults.error || '读取默认值失败');
    }
    applyDefaultsToUi(defaults);
    const source = defaults.defaults_source === 'user' ? '用户默认值' : '出厂默认值';
    setStatus(`已加载${source}。`, 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  }
}

async function saveDefaults() {

    });

  } catch (err) {

function formatNumber(value, digits = 3) {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return '--';
  return Number(value).toFixed(digits);
}

function formatElapsedTime(totalSeconds) {
  if (totalSeconds === null || totalSeconds === undefined || !Number.isFinite(Number(totalSeconds))) {
    return '--';
  }
  const seconds = Math.max(0, Math.floor(Number(totalSeconds)));
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const rest = seconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(rest).padStart(2, '0')}`;
}

function updateDerivedTimingFromInputs() {
  const rate = Number(document.getElementById('rate').value);
  const samples = Number(document.getElementById('samples').value);
  if (rate > 0 && samples > 0) {
    document.getElementById('frame_duration_ms').value = formatNumber(samples / rate * 1000.0, 3);
    document.getElementById('frame_rate_hz').value = formatNumber(rate / samples, 3);
  } else {
    document.getElementById('frame_duration_ms').value = '--';
    document.getElementById('frame_rate_hz').value = '--';
  }
}

function updateStreamStatus(status) {
  const running = Boolean(status && status.running);
  const frameId = status && status.frame_id !== undefined ? status.frame_id : streamLastFrameId;
  const error = status && status.error ? `错误：${status.error}` : '';
  const source = status && status.stream_source ? status.stream_source : document.getElementById('stream_source').value;
  if (status && status.stream_source) {
    document.getElementById('stream_source').value = status.stream_source;
  }
  document.getElementById('stream_status').value = error || (running ? `运行中 / ${source}` : `停止 / ${source}`);
  document.getElementById('stream_frame_id').value = frameId || 0;
  if (status && status.frame_duration_ms !== null && status.frame_duration_ms !== undefined) {
    document.getElementById('frame_duration_ms').value = formatNumber(status.frame_duration_ms, 3);
  }
  if (status && status.frame_rate_hz !== null && status.frame_rate_hz !== undefined) {
    document.getElementById('frame_rate_hz').value = formatNumber(status.frame_rate_hz, 3);
  }
}

async function captureFrame() {
  const btn = document.getElementById('captureBtn');
  const streamStartBtn = document.getElementById('streamStartBtn');
  btn.disabled = true;
  streamStartBtn.disabled = true;
  const params = getCaptureParams();
  setStatus('正在从统一 AI 流抓取最新一帧...', '');
  try {
    const selectedChannels = encodeURIComponent(params.channels);
    const response = await fetch(`/api/stream/latest?stream_source=unified_stream&channels=${selectedChannels}`);
    latestFrame = await response.json();
    if (!response.ok || latestFrame.ok === false) {
      throw new Error(latestFrame.error || '抓取统一 AI 流最新帧失败');
    }
    latestMeasurement = null;
    document.getElementById('saveBtn').disabled = false;
    renderPlots();
    updateFrameInfo();
    await measurePeaks();
    setStatus('已抓取统一 AI 流最新帧。', 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  } finally {
    btn.disabled = false;
    streamStartBtn.disabled = false;
  }
}

async function startBackendStream() {
  if (streamRunning) return;
  const params = getCaptureParams();
  params.samples_per_frame = params.samples;
  updateDerivedTimingFromInputs();
  try {
    const status = await postJson('/api/stream/start', params);
    streamRunning = true;
    streamLastFrameId = 0;
    streamConsecutiveErrors = 0;
    streamPollInFlight = false;
    document.getElementById('streamStartBtn').disabled = true;
    document.getElementById('streamStopBtn').disabled = false;
    document.getElementById('captureBtn').disabled = true;
    updateStreamStatus(status);
    setStatus('连续采集已启动，等待最新帧...', 'ok');
    streamTimer = setInterval(pollBackendStreamLatest, 80);
  } catch (err) {
    const message = String(err.message || err);
    if (message.includes('AI frame stream is already running')) {
      await syncBackendStreamStatus(true);
    } else {
      setStatus(message, 'error');
      stopBackendStreamUiOnly();
    }
  }
}

async function stopBackendStream() {
  try {
    const status = await postJson('/api/stream/stop', {
      stream_source: document.getElementById('stream_source').value,
    });
    updateStreamStatus(status);
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  } finally {
    stopBackendStreamUiOnly();
  }
}

function stopBackendStreamUiOnly() {
  streamRunning = false;
  streamPollInFlight = false;
  if (streamTimer !== null) {
    clearInterval(streamTimer);
    streamTimer = null;
  }
  document.getElementById('streamStartBtn').disabled = false;
  document.getElementById('streamStopBtn').disabled = true;
  document.getElementById('captureBtn').disabled = false;
  updateStreamStatus({running: false, frame_id: streamLastFrameId});
}

async function syncBackendStreamStatus(showStatus = false) {
  try {
    const response = await fetch('/api/stream/status');
    const status = await response.json();
    if (!response.ok || status.ok === false) {

function updateTrendStatus(status) {
  const running = Boolean(status && status.running);
  const latest = status && status.latest_stats ? status.latest_stats : {};
  trendRunning = running;
  latestTrendStats = Object.keys(latest).length ? latest : null;
  const error = status && status.error ? `错误：${status.error}` : '';
  const stoppedByDuration = status && status.stop_reason === 'duration_elapsed';
  document.getElementById('trend_status').value = error
    || (running ? '记录中' : (stoppedByDuration ? '已按设定时长结束' : '停止'));
  const elapsedText = formatElapsedTime(status && status.elapsed_seconds);
  const remainingText = formatElapsedTime(status && status.remaining_seconds);
  document.getElementById('trend_time_status').value = running && remainingText !== '--'
    ? `${elapsedText} / ${remainingText}`
    : elapsedText;
  document.getElementById('trend_records').value = status && status.records_written !== undefined
    ? status.records_written
    : 0;
  document.getElementById('trend_file').value = status && status.csv_file ? status.csv_file : '';
  const voltage = status && status.window_voltage ? status.window_voltage : {};
  const voltageError = voltage.error ? `错误：${voltage.error}` : '';
  document.getElementById('window_voltage_status').value = voltageError
    || (voltage.running ? '写入中' : (voltage.enabled ? '已停止' : '关闭'));
  document.getElementById('window_voltage_progress').value = voltage.enabled
    ? `帧=${voltage.frames_written || 0}  块=${voltage.chunks_written || 0}`
      + `  源漏帧=${voltage.source_gap_frames || 0}`
      + `  队列丢帧=${voltage.queue_dropped_frames || 0}`
      + `  文件=${formatBytes(voltage.bytes_written || 0)}`
    : '--';
  document.getElementById('window_voltage_directory').value = voltage.directory || '';

  if (latest.area_sum_mean !== undefined) {
    const rel = latest.area_sum_rel_std_percent === null || latest.area_sum_rel_std_percent === undefined
      ? '--'
      : `${formatNumber(latest.area_sum_rel_std_percent, 3)}%`;
    const shot = latest.area_sum_shot2shot_rel_std_percent === null || latest.area_sum_shot2shot_rel_std_percent === undefined
      ? '--'
      : `${formatNumber(latest.area_sum_shot2shot_rel_std_percent, 3)}%`;
    const emaText = latest.area_sum_ema === null || latest.area_sum_ema === undefined
      ? 'EMA=--'
      : `EMA=${Number(latest.area_sum_ema).toExponential(6)}`;
    const areaAText = latest.area_ema === null || latest.area_ema === undefined
      ? 'A=--'
      : `A=${Number(latest.area_ema).toExponential(6)}`;
    const areaBText = latest.area2_ema === null || latest.area2_ema === undefined
      ? 'B=--'
      : `B=${Number(latest.area2_ema).toExponential(6)}`;
    document.getElementById('trend_latest').value =
      `SUM=${Number(latest.area_sum_mean).toExponential(6)}  ${emaText}  ${areaAText}  ${areaBText}  std=${rel}  shot=${shot}`;
  } else {
    document.getElementById('trend_latest').value = '--';
  }
  drawAreaTrend(status && Array.isArray(status.recent_stats) ? status.recent_stats : []);
  drawPeakHeightTrend(status && Array.isArray(status.recent_stats) ? status.recent_stats : []);
  updateManualAreaTable();
  updateDualAreaTable();
  updateDualPeakHeightTable();
  renderPlots();

  document.getElementById('trendStartBtn').disabled = running;
  document.getElementById('trendStopBtn').disabled = !running;
  if (running && trendTimer === null) {
    trendTimer = setInterval(() => refreshTrendStatus(false), 1000);
  }
  if (!running && trendTimer !== null) {
    clearInterval(trendTimer);
    trendTimer = null;
  }
}

function formatBytes(value) {
  const bytes = Number(value);
  if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
  if (bytes < 1024) return `${bytes.toFixed(0)} B`;
  if (bytes < 1024 ** 2) return `${(bytes / 1024).toFixed(2)} KiB`;
  if (bytes < 1024 ** 3) return `${(bytes / 1024 ** 2).toFixed(2)} MiB`;
  return `${(bytes / 1024 ** 3).toFixed(2)} GiB`;
}

function updateWindowVoltageEstimate() {
  const mode = document.getElementById('window_voltage_mode').value;
  if (mode === 'none') {
    document.getElementById('window_voltage_estimate').value = '--';
    return;
  }
  const rate = Number(document.getElementById('rate').value);
  const samples = Number(document.getElementById('samples').value);
  const frameRate = rate > 0 && samples > 0 ? rate / samples : 0;
  const leftA = document.getElementById('manual_area_left').value;
  const rightA = document.getElementById('manual_area_right').value;
  const leftB = document.getElementById('manual_area2_left').value;
  const rightB = document.getElementById('manual_area2_right').value;
  const widthA = leftA === '' || rightA === '' ? NaN : Math.abs(Number(rightA) - Number(leftA)) + 1;
  const widthB = leftB === '' || rightB === '' ? NaN : Math.abs(Number(rightB) - Number(leftB)) + 1;
  let pointsPerFrame = 0;
  if (mode === 'a' || mode === 'both') pointsPerFrame += Number.isFinite(widthA) ? widthA : 0;
  if (mode === 'b' || mode === 'both') pointsPerFrame += Number.isFinite(widthB) ? widthB : 0;
  const bytesPerSecond = frameRate * pointsPerFrame * 4;
  document.getElementById('window_voltage_estimate').value =
    `${formatBytes(bytesPerSecond)}/s，约 ${formatBytes(bytesPerSecond * 3600)}/h`;
}

function drawTrendChart({canvasId, rows, requiredField, waitText, series}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const devicePixelRatio = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * devicePixelRatio));
  canvas.height = Math.max(1, Math.floor(rect.height * devicePixelRatio));
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const points = (rows || [])
    .filter(row => row[requiredField] !== null && row[requiredField] !== undefined)
    .slice(-300);
  if (points.length < 2) {
    ctx.fillStyle = '#6b7280';
    ctx.font = `${12 * devicePixelRatio}px Segoe UI`;
    ctx.fillText(waitText, 10 * devicePixelRatio, 24 * devicePixelRatio);
    return;
  }

  const preparedSeries = series.map(item => ({
    ...item,
    values: points.map(row => row[item.field] === null || row[item.field] === undefined
      ? NaN
      : Number(row[item.field])),
  }));
  const allValues = preparedSeries
    .flatMap(item => item.values)
    .filter(value => Number.isFinite(value));
  if (!allValues.length) return;
  let min = Math.min(...allValues);
  let max = Math.max(...allValues);
  if (!Number.isFinite(min) || !Number.isFinite(max)) return;
  if (max === min) {
    max += 1;
    min -= 1;
  }

  const padL = 42 * devicePixelRatio;
  const padR = 10 * devicePixelRatio;
  const padT = 16 * devicePixelRatio;
  const padB = 24 * devicePixelRatio;
  const plotW = canvas.width - padL - padR;
  const plotH = canvas.height - padT - padB;
  const xFor = index => padL + (index / Math.max(1, points.length - 1)) * plotW;
  const yFor = value => padT + (1 - (value - min) / (max - min)) * plotH;

  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 1 * devicePixelRatio;
  ctx.strokeRect(padL, padT, plotW, plotH);
  ctx.fillStyle = '#6b7280';
  ctx.font = `${10 * devicePixelRatio}px Segoe UI`;
  ctx.fillText(max.toExponential(2), 4 * devicePixelRatio, padT + 8 * devicePixelRatio);
  ctx.fillText(min.toExponential(2), 4 * devicePixelRatio, padT + plotH);

  let legendX = padL;
  preparedSeries.forEach(item => {
    drawTrendLine(ctx, item.values, xFor, yFor, item.color, devicePixelRatio);
    ctx.fillStyle = item.color;
    ctx.fillText(item.label, legendX, canvas.height - 8 * devicePixelRatio);
    legendX += ctx.measureText(item.label).width + 18 * devicePixelRatio;
  });
}

function drawTrendLine(ctx, values, xFor, yFor, color, devicePixelRatio) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.4 * devicePixelRatio;
  ctx.beginPath();
  let started = false;
  values.forEach((value, index) => {
    if (!Number.isFinite(value)) return;
    const x = xFor(index);
    const y = yFor(value);
    if (!started) {
      ctx.moveTo(x, y);
      started = true;
    } else {
      ctx.lineTo(x, y);
    }
  });
  if (started) ctx.stroke();
}

function drawAoScan(points) {
  const canvas = document.getElementById('aoScanCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const devicePixelRatio = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * devicePixelRatio));
  canvas.height = Math.max(1, Math.floor(rect.height * devicePixelRatio));
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const rows = (points || [])
    .filter(point => point.ao_voltage !== undefined && point.area_value_mean !== undefined && point.area_value_mean !== null)
    .map(point => ({
      voltage: Number(point.ao_voltage),
      value: Number(point.area_value_mean),
    }))
    .filter(point => Number.isFinite(point.voltage) && Number.isFinite(point.value));

  if (rows.length < 2) {
    ctx.fillStyle = '#6b7280';
    ctx.font = `${12 * devicePixelRatio}px Segoe UI`;
    ctx.fillText('等待 AO 扫描点...', 10 * devicePixelRatio, 24 * devicePixelRatio);
    return;
  }

  let minX = Math.min(...rows.map(point => point.voltage));
  let maxX = Math.max(...rows.map(point => point.voltage));
  let minY = Math.min(...rows.map(point => point.value));
  let maxY = Math.max(...rows.map(point => point.value));
  if (maxX === minX) {
    maxX += 1;
    minX -= 1;
  }
  if (maxY === minY) {
    maxY += 1;
    minY -= 1;
  }

  const padL = 48 * devicePixelRatio;
  const padR = 12 * devicePixelRatio;
  const padT = 16 * devicePixelRatio;
  const padB = 26 * devicePixelRatio;
  const plotW = canvas.width - padL - padR;
  const plotH = canvas.height - padT - padB;
  const xFor = value => padL + ((value - minX) / (maxX - minX)) * plotW;
  const yFor = value => padT + (1 - (value - minY) / (maxY - minY)) * plotH;

  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 1 * devicePixelRatio;
  ctx.strokeRect(padL, padT, plotW, plotH);
  ctx.fillStyle = '#6b7280';
  ctx.font = `${10 * devicePixelRatio}px Segoe UI`;
  ctx.fillText(maxY.toExponential(2), 4 * devicePixelRatio, padT + 8 * devicePixelRatio);
  ctx.fillText(minY.toExponential(2), 4 * devicePixelRatio, padT + plotH);
  ctx.fillText(`${formatNumber(minX, 3)} V`, padL, canvas.height - 8 * devicePixelRatio);
  ctx.fillText(`${formatNumber(maxX, 3)} V`, padL + plotW - 42 * devicePixelRatio, canvas.height - 8 * devicePixelRatio);

  ctx.strokeStyle = '#16833a';
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.beginPath();
  rows.forEach((point, index) => {
    const x = xFor(point.voltage);
    const y = yFor(point.value);
    if (index === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = '#16833a';
  rows.forEach(point => {
    const x = xFor(point.voltage);
    const y = yFor(point.value);
    ctx.beginPath();
    ctx.arc(x, y, 2.5 * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  });
}

  }
  if (!Number.isFinite(params.value)) {
    setStatus('单路 AO 诊断电压必须是数字。', 'error');
    return;
  }
  if (!Number.isFinite(params.min_val) || !Number.isFinite(params.max_val) || params.min_val >= params.max_val) {
    setStatus('单路 AO 诊断的最小值必须小于最大值。', 'error');
    return;
  }
  if (params.value < params.min_val || params.value > params.max_val) {
    setStatus('单路 AO 诊断电压必须在安全范围内。', 'error');
    return;
  }
  try {
    const result = await postJson('/api/ao_test/write', params);
    const returned = result.result || {};
    setStatus(
      `单路 AO 已写入：${returned.channel || result.channel} = ${formatNumber(returned.value ?? result.value, 5)} V`,
      'ok'
    );
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  }
}

function buildPowerLockControllers() {
  const params = getPowerLockParams();
  return [
    {
      name: 'EOM',
      role: 'area_a',
      channel: params.lock_eom_channel,
      feedback_field: params.lock_eom_feedback,
      target: params.lock_eom_target,
      initial_voltage: params.lock_eom_initial,
      min_voltage: params.lock_eom_min,
      max_voltage: params.lock_eom_max,
      direction: params.lock_eom_direction,
      max_step_v: params.lock_eom_max_step,
      kp: params.lock_eom_kp,
      ki: params.lock_eom_ki,
      enabled: params.lock_eom_enabled,
    },
    {
      name: 'AOM',
      role: 'area_b',
      channel: params.lock_aom_channel,
      feedback_field: params.lock_aom_feedback,
      target: params.lock_aom_target,
      initial_voltage: params.lock_aom_initial,
      min_voltage: params.lock_aom_min,
      max_voltage: params.lock_aom_max,
      direction: params.lock_aom_direction,
      max_step_v: params.lock_aom_max_step,
      kp: params.lock_aom_kp,
      ki: params.lock_aom_ki,
      enabled: params.lock_aom_enabled,
    },
  ];
}

function validatePowerLockController(controller) {
  if (!controller.enabled) return;
  if (!controller.channel.trim()) {
    throw new Error(`${controller.name} AO 通道不能为空。`);
  }
  for (const key of ['target', 'initial_voltage', 'min_voltage', 'max_voltage', 'direction', 'max_step_v', 'kp', 'ki']) {
    if (!Number.isFinite(Number(controller[key]))) {
      throw new Error(`${controller.name} 的 ${key} 必须是数字。`);
    }
  }
  if (controller.min_voltage >= controller.max_voltage) {
    throw new Error(`${controller.name} 最小电压必须小于最大电压。`);
  }
  if (controller.initial_voltage < controller.min_voltage || controller.initial_voltage > controller.max_voltage) {
    throw new Error(`${controller.name} 初始电压必须在安全范围内。`);
  }
  if (controller.max_step_v < 0) {
    throw new Error(`${controller.name} 单步限幅必须 >= 0。`);
  }
  if (![1, -1].includes(Number(controller.direction))) {
    throw new Error(`${controller.name} 控制方向只能是 +1 或 -1。`);
  }
}

async function writePowerLockInitialAo() {
  try {
    const controllers = buildPowerLockControllers();
    controllers.forEach(validatePowerLockController);
    const updateS = Number(document.getElementById('lock_update_s').value);
    if (!Number.isFinite(updateS) || updateS <= 0) {
      throw new Error('锁定更新周期必须 > 0。');
    }
    const result = await postJson('/api/power_lock/write_initial_ao', {controllers});
    const text = result.written
      .map(item => {
        const returned = item.result || {};
        return `${item.name || item.channel}:${returned.channel || item.channel}=${formatNumber(returned.value ?? item.initial_voltage, 4)} V`;
      })
      .join('  ');
    setStatus(`已写入初始 AO 电压：${text}`, 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  }
}

function formatPowerLockState(state) {
  if (!state) return '--';
  const measured = state.measured === null || state.measured === undefined
    ? '--'
    : Number(state.measured).toExponential(5);
  const errorPercent = state.relative_error === null || state.relative_error === undefined
    ? '--'
    : `${formatNumber(Number(state.relative_error) * 100, 3)}%`;
  const voltage = state.voltage === null || state.voltage === undefined
    ? '--'
    : `${formatNumber(state.voltage, 5)} V`;
  const limited = state.limited ? '  LIMIT' : '';
  return `${state.feedback_field}=${measured}  err=${errorPercent}  AO=${voltage}${limited}`;
}

function updatePowerLockStatus(status) {
  const running = Boolean(status && status.running);
  const error = status && status.error ? status.error : '';
  const states = status && Array.isArray(status.states) ? status.states : [];
  const eomState = states.find(state => state.name === 'EOM') || states[0];
  const aomState = states.find(state => state.name === 'AOM') || states[1];

  document.getElementById('power_lock_status').value = error || (running ? '锁定中' : '停止');
  document.getElementById('power_lock_iterations').value = status && status.iterations !== undefined
    ? String(status.iterations)
    : '0';
  document.getElementById('power_lock_eom_status').value = formatPowerLockState(eomState);
  document.getElementById('power_lock_aom_status').value = formatPowerLockState(aomState);
  document.getElementById('powerLockStartBtn').disabled = running;
  document.getElementById('powerLockStopBtn').disabled = !running;

  if (running && powerLockTimer === null) {
    powerLockTimer = setInterval(() => refreshPowerLockStatus(false), 1000);
  }
  if (!running && powerLockTimer !== null) {
    clearInterval(powerLockTimer);
    powerLockTimer = null;
  }
}

async function refreshPowerLockStatus(showStatus = false) {
  try {
    const response = await fetch('/api/power_lock/status');
    const status = await response.json();
    if (!response.ok || status.ok === false) {
      throw new Error(status.error || '查询功率锁定状态失败');
    }
    updatePowerLockStatus(status);
    if (showStatus && status.running) {
      setStatus('检测到功率锁定正在运行，已接管状态。', 'ok');
    }
  } catch (err) {
    if (showStatus) {
      setStatus(String(err.message || err), 'error');
    }
  }
}

async function startPowerLock() {
  try {
    const controllers = buildPowerLockControllers();
    controllers.forEach(validatePowerLockController);
    const updateS = Number(document.getElementById('lock_update_s').value);
    if (!Number.isFinite(updateS) || updateS <= 0) {
      throw new Error('锁定更新周期必须 > 0。');
    }
    const status = await postJson('/api/power_lock/start', {
      controllers,
      update_s: updateS,
    });
    updatePowerLockStatus(status);
    setStatus('双路慢速功率锁定已启动。', 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
    await refreshPowerLockStatus(false);
  }
}

async function stopPowerLock() {
  try {
    const status = await postJson('/api/power_lock/stop', {});
    updatePowerLockStatus(status);
    setStatus('双路慢速功率锁定已停止，AO 保持最后输出。', 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  }
}

async function pollBackendStreamLatest() {
  if (!streamRunning) return;
  if (streamPollInFlight) return;
  streamPollInFlight = true;
  try {
    const selectedChannels = encodeURIComponent(document.getElementById('channels').value);
    const response = await fetch(`/api/stream/latest?stream_source=unified_stream&channels=${selectedChannels}`);
    const frame = await response.json();
    if (!response.ok || frame.ok === false) {
      const statusResponse = await fetch('/api/stream/status');
      const status = await statusResponse.json();
      if (status.error) {
        throw new Error(status.error);
      }
      return;
    }
    if (frame.frame_id === streamLastFrameId) return;
    streamConsecutiveErrors = 0;
    streamLastFrameId = frame.frame_id;
    latestFrame = frame;
    latestMeasurement = null;
    document.getElementById('saveBtn').disabled = false;
    updateStreamStatus({
      running: true,
      frame_id: frame.frame_id,
      frame_duration_ms: frame.frame_duration_ms,
      frame_rate_hz: frame.frame_rate_hz,
    });
    renderPlots();
    updateFrameInfo();
    await measurePeaks();
    setStatus(`连续采集中，最新帧 #${streamLastFrameId}。`, 'ok');
  } catch (err) {
    streamConsecutiveErrors += 1;
    const message = String(err.message || err);
    setStatus(`显示轮询暂时失败 ${streamConsecutiveErrors}/50：${message}`, 'error');
    if (streamConsecutiveErrors >= 50) {
      stopBackendStreamUiOnly();
    }
  } finally {
    streamPollInFlight = false;
  }
}

async function measurePeaks() {
  if (!latestFrame) {
    setStatus('还没有采集波形。', 'error');
    return;
  }
  try {
    latestMeasurement = await postJson('/api/measure', getMeasureParams());
    updateDualAreaHistory();
    updatePeakTable();
    updateManualAreaTable();
    updateDualAreaTable();
    renderPlots();
    setStatus('测峰完成。', 'ok');
  } catch (err) {
    setStatus(String(err.message || err), 'error');
  }
}

async function saveFrame() {

    return;
  }
  try {
    const saved = await postJson('/api/save', {
      parameters: getAllUiParameters(),

    await refreshSavedSamples();

async function refreshSavedSamples() {
  try {
    const response = await fetch('/api/samples');
    const data = await response.json();
    if (!response.ok || data.ok === false) {
      throw new Error(data.error || '读取样本列表失败');
    }
    const select = document.getElementById('saved_samples');
    select.innerHTML = '';
    for (const item of data.samples || []) {
      const option = document.createElement('option');
      option.value = item.metadata_file;

      option.textContent = `${dateText}  ${frame.channels || ''}  ${frame.samples_per_channel || ''}点`;

      const option = document.createElement('option');

async function loadSavedSample() {

function clearPeaks() {
  latestMeasurement = null;
  manualAreaHistory = [];
  manualArea2History = [];
  updatePeakTable();
  updateManualAreaTable();
  updateDualAreaTable();
  renderPlots();
}

function getVisibleRange(length) {
  if (!length || length < 2) return {start: 0, end: 0};
  let start = Number.isFinite(xViewStart) ? Math.round(xViewStart) : 0;
  let end = Number.isFinite(xViewEnd) ? Math.round(xViewEnd) : length - 1;
  start = Math.min(Math.max(start, 0), length - 1);
  end = Math.min(Math.max(end, 0), length - 1);
  if (end <= start) {
    start = 0;
    end = length - 1;
  }
  return {start, end};
}

function applyXView(showStatus = true) {
  const startText = document.getElementById('x_start').value.trim();
  const endText = document.getElementById('x_end').value.trim();
  xViewStart = startText === '' ? null : Number(startText);
  xViewEnd = endText === '' ? null : Number(endText);
  renderPlots();
  if (showStatus) {
    setStatus('已应用横向视图范围。', 'ok');
  }
}

function resetXView(showStatus = true) {
  xViewStart = null;
  xViewEnd = null;
  document.getElementById('x_start').value = '';
  document.getElementById('x_end').value = '';
  renderPlots();
  if (showStatus) {
    setStatus('已显示全帧。', 'ok');
  }
}

function renderPlots() {
  const container = document.getElementById('plots');
  container.innerHTML = '';
  plotCanvases = [];
  if (!latestFrame || !latestFrame.values) return;

  const count = latestFrame.values.length;
  if (count <= 2) {
    container.style.gridTemplateRows = `repeat(${count}, minmax(0, 1fr))`;
  } else {
    container.style.gridTemplateRows = `repeat(${count}, minmax(220px, 1fr))`;
  }

  latestFrame.values.forEach((data, index) => {
    const box = document.createElement('div');
    box.className = 'plot';
    const title = document.createElement('div');
    title.className = 'plot-title';
    title.textContent = `${latestFrame.channels[index]}  ${data.length} 点`;
    const canvas = document.createElement('canvas');
    canvas.addEventListener('click', event => handlePlotClick(event, index));
    canvas.addEventListener('mousemove', event => updateCursor(event, index));
    box.appendChild(title);
    box.appendChild(canvas);
    container.appendChild(box);
    plotCanvases.push({canvas, data, index});
  });

  resizeAndDraw();
}

function resizeAndDraw() {
  for (const item of plotCanvases) {
    const rect = item.canvas.parentElement.getBoundingClientRect();
    item.canvas.width = Math.max(300, Math.floor(rect.width * devicePixelRatio));
    item.canvas.height = Math.max(180, Math.floor(rect.height * devicePixelRatio));
    drawWaveform(item.canvas, item.data, item.index);
  }
}

function drawWaveform(canvas, data, channelIndex) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  if (!data || data.length < 2) return;
  const range = getVisibleRange(data.length);
  let min = data[range.start];
  let max = data[range.start];
  for (let i = range.start; i <= range.end; i += 1) {
    const value = data[i];
    if (value < min) min = value;
    if (value > max) max = value;
  }
  const span = Math.max(1e-12, max - min);
  const padX = 44 * devicePixelRatio;
  const padY = 28 * devicePixelRatio;
  const x0 = padX;
  const y0 = padY;
  const plotW = w - 2 * padX;
  const plotH = h - 2 * padY;

  ctx.strokeStyle = '#d7dde5';
  ctx.lineWidth = 1 * devicePixelRatio;
  ctx.strokeRect(x0, y0, plotW, plotH);

  ctx.beginPath();
  for (let i = range.start; i <= range.end; i += 1) {
    const value = data[i];
    const x = x0 + ((i - range.start) / Math.max(1, range.end - range.start)) * plotW;
    const y = y0 + (1 - (value - min) / span) * plotH;
    if (i === range.start) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = channelIndex === 0 ? '#1f6feb' : '#16833a';
  ctx.lineWidth = 1.4 * devicePixelRatio;
  ctx.stroke();

  drawMarkers(ctx, data, channelIndex, x0, y0, plotW, plotH, min, span, range);

  ctx.fillStyle = '#697586';
  ctx.font = `${11 * devicePixelRatio}px Consolas`;
  ctx.fillText(`min ${min.toFixed(5)} V`, x0, h - 8 * devicePixelRatio);
  ctx.fillText(`max ${max.toFixed(5)} V`, x0 + 150 * devicePixelRatio, h - 8 * devicePixelRatio);
  ctx.fillText(`x ${range.start}-${range.end}`, x0 + 300 * devicePixelRatio, h - 8 * devicePixelRatio);
}

function getActiveAreaStats() {
  // 面积慢漂记录运行时，功率锁定实际读取的就是 latestTrendStats。
  // 因此画线和表格也必须优先使用这份后端统计，不能再使用输入框里的旧窗口。
  if (!trendRunning || !latestTrendStats) return null;
  if (latestTrendStats.area_left === undefined || latestTrendStats.area_right === undefined) return null;
  return latestTrendStats;
}

function getDisplayedAreaEdges() {
  const stats = getActiveAreaStats();
  if (stats) {
    return [
      {index: Number(stats.area_left), label: 'A-L', color: '#7c3aed'},
      {index: Number(stats.area_right), label: 'A-R', color: '#7c3aed'},
      {index: Number(stats.area2_left), label: 'B-L', color: '#16803c'},
      {index: Number(stats.area2_right), label: 'B-R', color: '#16803c'},
    ];
  }
  return [
    {index: Number(document.getElementById('manual_area_left').value), label: 'A-L', color: '#7c3aed'},
    {index: Number(document.getElementById('manual_area_right').value), label: 'A-R', color: '#7c3aed'},
    {index: Number(document.getElementById('manual_area2_left').value), label: 'B-L', color: '#16803c'},
    {index: Number(document.getElementById('manual_area2_right').value), label: 'B-R', color: '#16803c'},
  ];
}

function drawMarkers(ctx, data, channelIndex, x0, y0, plotW, plotH, min, span, range) {
  const analysisIndex = Number(document.getElementById('analysis_channel_index').value);
  if (channelIndex !== analysisIndex) return;

  const peaks = [
    Number(document.getElementById('peak0').value),
    Number(document.getElementById('peak1').value),
  ];
  peaks.forEach((idx, i) => {
    if (!Number.isFinite(idx) || idx < range.start || idx > range.end) return;
    const x = x0 + ((idx - range.start) / Math.max(1, range.end - range.start)) * plotW;
    ctx.strokeStyle = i === 0 ? '#c62828' : '#9a6700';
    ctx.lineWidth = 1.3 * devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y0 + plotH);
    ctx.stroke();
    ctx.fillStyle = i === 0 ? '#c62828' : '#9a6700';
    ctx.font = `${12 * devicePixelRatio}px Segoe UI`;
    ctx.fillText(i === 0 ? 'P1' : 'P2', x + 4 * devicePixelRatio, y0 + 16 * devicePixelRatio);
  });

  const areaEdges = getDisplayedAreaEdges();
  areaEdges.forEach(edge => {
    const idx = Number(edge.index);
    if (!Number.isFinite(idx) || idx < range.start || idx > range.end) return;
    const x = x0 + ((idx - range.start) / Math.max(1, range.end - range.start)) * plotW;
    ctx.strokeStyle = edge.color;
    ctx.lineWidth = 1.2 * devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y0 + plotH);
    ctx.stroke();
    ctx.fillStyle = edge.color;
    ctx.font = `${12 * devicePixelRatio}px Segoe UI`;
    ctx.fillText(edge.label, x + 4 * devicePixelRatio, y0 + 32 * devicePixelRatio);
  });

  if (latestMeasurement && latestMeasurement.measurements) {
    latestMeasurement.measurements.forEach((m, i) => {
      const idx = m.index;
      if (idx < range.start || idx > range.end) return;
      const x = x0 + ((idx - range.start) / Math.max(1, range.end - range.start)) * plotW;
      const y = y0 + (1 - (data[idx] - min) / span) * plotH;
      ctx.fillStyle = i === 0 ? '#c62828' : '#9a6700';
      ctx.beginPath();
      ctx.arc(x, y, 4 * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
    });
  }
}

function handlePlotClick(event, channelIndex) {
  const analysisIndex = Number(document.getElementById('analysis_channel_index').value);
  if (channelIndex !== analysisIndex || !latestFrame) return;
  const item = plotCanvases[channelIndex];
  const idx = eventToSampleIndex(event, item.canvas, item.data.length);
  const target = document.getElementById('pick_target').value;
  if (target === 'area_left') {
    document.getElementById('manual_area_left').value = idx;
    document.getElementById('pick_target').value = 'area_right';
    manualAreaHistory = [];
  } else if (target === 'area_right') {
    document.getElementById('manual_area_right').value = idx;
    document.getElementById('pick_target').value = 'area_left';
    manualAreaHistory = [];
  } else if (target === 'area2_left') {
    document.getElementById('manual_area2_left').value = idx;
    document.getElementById('pick_target').value = 'area2_right';
    manualArea2History = [];
  } else if (target === 'area2_right') {
    document.getElementById('manual_area2_right').value = idx;
    document.getElementById('pick_target').value = 'area2_left';
    manualArea2History = [];
  } else {
    document.getElementById(target === '0' ? 'peak0' : 'peak1').value = idx;
    document.getElementById('pick_target').value = target === '0' ? '1' : '0';
  }
  measurePeaks();
}

function updateCursor(event, channelIndex) {
  const item = plotCanvases[channelIndex];
  const idx = eventToSampleIndex(event, item.canvas, item.data.length);
  const value = item.data[idx];
  document.getElementById('cursorInfo').textContent =
    `${latestFrame.channels[channelIndex]}  index=${idx}  value=${value.toFixed(6)} V`;
}

function eventToSampleIndex(event, canvas, length) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.min(Math.max(event.clientX - rect.left, 0), rect.width);
  const range = getVisibleRange(length);
  return Math.round(range.start + (x / Math.max(1, rect.width)) * (range.end - range.start));
}

function updatePeakTable() {
  const rows = document.getElementById('peakRows');
  if (!latestMeasurement || !latestMeasurement.measurements) {
    rows.innerHTML = '<tr><td>P1</td><td>--</td><td>--</td><td>--</td></tr><tr><td>P2</td><td>--</td><td>--</td><td>--</td></tr>';
    return;
  }
  rows.innerHTML = latestMeasurement.measurements.map((m, i) => `
    <tr>
      <td>${i === 0 ? 'P1' : 'P2'}</td>
      <td>${m.index}</td>
      <td>${Number(m.value).toExponential(6)}</td>
      <td>${m.window_left}-${m.window_right}</td>
    </tr>
  `).join('');
}

function updateManualAreaHistory() {
  if (!latestMeasurement || !latestMeasurement.manual_area) return;
  const value = Number(latestMeasurement.manual_area.value);
  if (!Number.isFinite(value)) return;
  manualAreaHistory.push(value);
  if (manualAreaHistory.length > 200) {
    manualAreaHistory = manualAreaHistory.slice(-200);
  }
}

function getAreaByName(name) {
  const areas = latestMeasurement && Array.isArray(latestMeasurement.manual_areas)
    ? latestMeasurement.manual_areas
    : [];
  return areas.find(area => area.name === name) || null;
}

function pushAreaHistory(history, area) {
  if (!area) return history;
  const value = Number(area.value);
  if (!Number.isFinite(value)) return history;
  const next = [...history, value];
  return next.length > 200 ? next.slice(-200) : next;
}

function updateDualAreaHistory() {
  // A 窗口复用旧 manual_area；B 窗口读取新增 manual_areas 里的 B。
  // 这里只保存最近 200 帧，目的是看 shot-to-shot 抖动，不做长期存档。
  const areaA = getAreaByName('A') || (latestMeasurement ? latestMeasurement.manual_area : null);
  const areaB = getAreaByName('B');
  manualAreaHistory = pushAreaHistory(manualAreaHistory, areaA);
  manualArea2History = pushAreaHistory(manualArea2History, areaB);
}

function updateManualAreaTable() {
  const rows = document.getElementById('manualAreaRows');
  const trendStats = getActiveAreaStats();
  if (trendStats) {
    rows.innerHTML = `
      <tr><td>范围</td><td>${trendStats.area_left}-${trendStats.area_right}</td></tr>
      <tr><td>当前面积</td><td>${Number(trendStats.area_current).toExponential(6)}</td></tr>
      <tr><td>均值</td><td>${Number(trendStats.area_mean).toExponential(6)}</td></tr>
      <tr><td>EMA</td><td>${trendStats.area_ema === null || trendStats.area_ema === undefined ? '--' : Number(trendStats.area_ema).toExponential(6)}</td></tr>
      <tr><td>标准差</td><td>${Number(trendStats.area_std).toExponential(6)} / ${trendStats.sample_count} 帧</td></tr>
    `;
    return;
  }

  const area = latestMeasurement ? latestMeasurement.manual_area : null;
  if (!area) {
    rows.innerHTML = '<tr><td>面积</td><td>--</td></tr><tr><td>最近抖动</td><td>--</td></tr>';
    return;
  }

  const mean = manualAreaHistory.length
    ? manualAreaHistory.reduce((sum, value) => sum + value, 0) / manualAreaHistory.length
    : Number(area.value);
  const variance = manualAreaHistory.length
    ? manualAreaHistory.reduce((sum, value) => sum + (value - mean) ** 2, 0) / manualAreaHistory.length
    : 0;
  const std = Math.sqrt(variance);
  rows.innerHTML = `
    <tr><td>范围</td><td>${area.left_index}-${area.right_index}，${area.point_count} 点</td></tr>
    <tr><td>面积</td><td>${Number(area.value).toExponential(6)}</td></tr>
    <tr><td>最近均值</td><td>${mean.toExponential(6)}</td></tr>
    <tr><td>最近标准差</td><td>${std.toExponential(6)} / ${manualAreaHistory.length} 帧</td></tr>
  `;
}

function trendAreaStats(name) {
  const stats = getActiveAreaStats();
  if (!stats) return null;
  if (name === 'A') {
    return {
      range: `${stats.area_left}-${stats.area_right}`,
      current: stats.area_current,
      mean: stats.area_mean,
      ema: stats.area_ema,
      std: stats.area_std,
      sampleCount: stats.sample_count,
    };
  }
  if (stats.area2_left === null || stats.area2_left === undefined) return null;
  return {
    range: `${stats.area2_left}-${stats.area2_right}`,
    current: stats.area2_current,
    mean: stats.area2_mean,
    ema: stats.area2_ema,
    std: stats.area2_std,
    sampleCount: stats.sample_count,
  };
}

function formatTrendAreaStats(stats) {
  if (!stats || stats.current === null || stats.current === undefined) {
    return {range: '--', current: '--', stats: '--'};
  }
  const meanText = stats.mean === null || stats.mean === undefined
    ? '--'
    : Number(stats.mean).toExponential(6);
  const stdText = stats.std === null || stats.std === undefined
    ? '--'
    : Number(stats.std).toExponential(6);
  const emaText = stats.ema === null || stats.ema === undefined
    ? '--'
    : Number(stats.ema).toExponential(6);
  return {
    range: stats.range,
    current: Number(stats.current).toExponential(6),
    stats: `${meanText} / ${stdText} / EMA ${emaText} / ${stats.sampleCount || 0} 帧`,
  };
}

function areaStats(history, area) {
  if (!area) {
    return {
      range: '--',
      current: '--',
      stats: '--',
    };
  }
  const values = history.length ? history : [Number(area.value)];
  const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
  const variance = values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / values.length;
  const std = Math.sqrt(variance);
  return {
    range: `${area.left_index}-${area.right_index}，${area.point_count} 点`,
    current: Number(area.value).toExponential(6),
    stats: `${mean.toExponential(6)} / ${std.toExponential(6)} / ${values.length} 帧`,
  };
}

function updateDualAreaTable() {
  const rows = document.getElementById('dualAreaRows');
  const trendStats = getActiveAreaStats();
  if (trendStats) {
    const statsA = formatTrendAreaStats(trendAreaStats('A'));
    const statsB = formatTrendAreaStats(trendAreaStats('B'));
    rows.innerHTML = `
      <tr><td>A</td><td>${statsA.range}</td><td>${statsA.current}</td><td>${statsA.stats}</td></tr>
      <tr><td>B</td><td>${statsB.range}</td><td>${statsB.current}</td><td>${statsB.stats}</td></tr>
    `;
    return;
  }

  const areaA = getAreaByName('A') || (latestMeasurement ? latestMeasurement.manual_area : null);
  const areaB = getAreaByName('B');
  const statsA = areaStats(manualAreaHistory, areaA);
  const statsB = areaStats(manualArea2History, areaB);
  rows.innerHTML = `
    <tr><td>A</td><td>${statsA.range}</td><td>${statsA.current}</td><td>${statsA.stats}</td></tr>
    <tr><td>B</td><td>${statsB.range}</td><td>${statsB.current}</td><td>${statsB.stats}</td></tr>
  `;
}

function trendPeakHeightStats(name) {
  // 峰高和面积直接读取同一条后端统计记录，确保动态窗口、帧数和 EMA 完全一致。
  const stats = getActiveAreaStats();
  if (!stats) return null;
  if (name === 'A') {
    return {
      index: stats.peak_height_index,
      current: stats.peak_height_current,
      mean: stats.peak_height_mean,
      std: stats.peak_height_std,
      ema: stats.peak_height_ema,
      sampleCount: stats.sample_count,
    };
  }
  if (stats.peak2_height_current === null || stats.peak2_height_current === undefined) return null;
  return {
    index: stats.peak2_height_index,
    current: stats.peak2_height_current,
    mean: stats.peak2_height_mean,
    std: stats.peak2_height_std,
    ema: stats.peak2_height_ema,
    sampleCount: stats.sample_count,
  };
}

function formatTrendPeakHeightStats(stats) {
  if (!stats || stats.current === null || stats.current === undefined) {
    return {index: '--', current: '--', stats: '--'};
  }
  const meanText = stats.mean === null || stats.mean === undefined
    ? '--'
    : Number(stats.mean).toExponential(6);
  const stdText = stats.std === null || stats.std === undefined
    ? '--'
    : Number(stats.std).toExponential(6);
  const emaText = stats.ema === null || stats.ema === undefined
    ? '--'
    : Number(stats.ema).toExponential(6);
  return {
    index: stats.index === null || stats.index === undefined ? '--' : String(stats.index),
    current: Number(stats.current).toExponential(6),
    stats: `${meanText} / ${stdText} / EMA ${emaText} / ${stats.sampleCount || 0} 帧`,
  };
}

function updateDualPeakHeightTable() {
  const rows = document.getElementById('dualPeakHeightRows');
  if (!rows) return;
  const statsA = formatTrendPeakHeightStats(trendPeakHeightStats('A'));
  const statsB = formatTrendPeakHeightStats(trendPeakHeightStats('B'));
  rows.innerHTML = `
    <tr><td>A</td><td>${statsA.index}</td><td>${statsA.current}</td><td>${statsA.stats}</td></tr>
    <tr><td>B</td><td>${statsB.index}</td><td>${statsB.current}</td><td>${statsB.stats}</td></tr>
  `;
}

function updateFrameInfo() {
  if (!latestFrame) return;
  const trig = latestFrame.trigger_enabled
    ? `  trigger=${latestFrame.trigger_source} ${latestFrame.trigger_edge} ${latestFrame.trigger_mode || 'start_only'}`
    : '  trigger=off';
  const frameMs = latestFrame.frame_duration_ms !== undefined
    ? `  frame=${formatNumber(latestFrame.frame_duration_ms, 3)} ms`
    : '';
  const frameHz = latestFrame.frame_rate_hz !== undefined
    ? `  fps=${formatNumber(latestFrame.frame_rate_hz, 3)} Hz`
    : '';
  const resync = latestFrame.resync_every_frames
    ? `  resync=${latestFrame.resync_every_frames} frames seg=${latestFrame.segment_id || 0}:${latestFrame.segment_frame_id || 0}`
    : '';
  document.getElementById('frameInfo').textContent =
    `channels=${latestFrame.channels.join(', ')}  rate=${latestFrame.rate_per_channel} Hz  samples=${latestFrame.samples_per_channel}${frameMs}${frameHz}${trig}${resync}`;
}

window.addEventListener('resize', resizeAndDraw);
for (const id of ['rate', 'samples']) {
  document.getElementById(id).addEventListener('input', () => {
    updateDerivedTimingFromInputs();
    updateWindowVoltageEstimate();
  });
}
for (const id of ['manual_area_left', 'manual_area_right', 'manual_area2_left', 'manual_area2_right']) {
  document.getElementById(id).addEventListener('input', () => {
    if (id.startsWith('manual_area2')) {
      manualArea2History = [];
    } else {
      manualAreaHistory = [];
    }
    updateManualAreaTable();
    updateDualAreaTable();
    updateWindowVoltageEstimate();
    renderPlots();
  });
}
document.getElementById('window_voltage_mode').addEventListener('change', updateWindowVoltageEstimate);
document.getElementById('sync_power_api_url').addEventListener('change', () => {
  refreshSyncTestStatus(false);
});
updateDerivedTimingFromInputs();
updateWindowVoltageEstimate();
updateStreamStatus({running: false, frame_id: 0});
updatePeakTable();
updateManualAreaTable();
updateDualAreaTable();
loadDefaults();
refreshSavedSamples();
syncBackendStreamStatus(true);
refreshTrendStatus(true);
refreshSyncTestStatus(false);
syncTestTimer = setInterval(() => refreshSyncTestStatus(false), 1000);
refreshAoScanStatus(true);
refreshPowerLockStatus(true);
</script>
</body>
