<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>4 小时 Python 读码训练营</title>
  <style>
    :root {
      --bg: #f6f7fa;
      --paper: #ffffff;
      --ink: #202832;
      --muted: #667386;
      --line: #dbe2eb;
      --soft: #edf2f7;
      --accent: #1f6f9f;
      --accent-dark: #15577e;
      --green: #20815f;
      --green-soft: #e8f5ef;
      --red: #b54343;
      --red-soft: #fff0f0;
      --yellow: #a96a16;
      --yellow-soft: #fff5df;
      --code: #111923;
      --code-ink: #e8f2f8;
      --shadow: 0 16px 44px rgba(28, 43, 62, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.68;
    }

    button,
    textarea {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: #fbfcfe;
      border-right: 1px solid var(--line);
      padding: 18px 16px;
    }

    .brand {
      padding: 6px 6px 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .meter {
      margin: 16px 6px;
    }

    .meter-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .meter-track {
      height: 8px;
      background: #dfe7ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.2s ease;
    }

    .time-block {
      margin: 16px 6px;
      padding: 12px;
      border-radius: 8px;
      background: var(--soft);
      color: #344254;
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 6px;
      margin-top: 12px;
    }

    .nav-title {
      margin: 18px 6px 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .nav-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      padding: 8px;
      border-radius: 7px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: var(--soft);
    }

    .nav-btn.active {
      background: #dcecf7;
      color: var(--accent-dark);
      font-weight: 700;
    }

    .nav-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #e4ebf2;
      color: #566579;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .nav-btn.done .nav-num {
      background: var(--green-soft);
      color: var(--green);
    }

    .nav-time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .main {
      padding: 24px clamp(16px, 4vw, 44px) 48px;
      min-width: 0;
    }

    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .kicker {
      margin: 0;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(26px, 3.2vw, 42px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 900px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn:hover {
      border-color: #adc0d1;
      background: #f8fbff;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn.green {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.16fr) minmax(340px, 0.84fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .lesson {
      padding: clamp(18px, 3vw, 30px);
    }

    .practice {
      position: sticky;
      top: 20px;
      padding: 18px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 3px 10px;
      border-radius: 999px;
      background: #edf5fb;
      color: #285b7a;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.green {
      background: var(--green-soft);
      color: var(--green);
    }

    .lesson h3,
    .practice h3 {
      margin: 18px 0 8px;
      font-size: 21px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .practice h3 {
      margin-top: 0;
      font-size: 18px;
    }

    .lesson h4 {
      margin: 15px 0 8px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .lesson p,
    .lesson li,
    .practice p {
      color: #303b49;
    }

    .lesson ul,
    .lesson ol {
      padding-left: 22px;
    }

    code {
      font-family: Consolas, "Cascadia Code", "Courier New", monospace;
      background: #e9eef5;
      border-radius: 5px;
      padding: 1px 5px;
      color: #213245;
    }

    pre {
      margin: 12px 0;
    }

    .code {
      background: var(--code);
      color: var(--code-ink);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      font-family: Consolas, "Cascadia Code", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre;
    }

    .callout {
      margin: 16px 0;
      border-left: 4px solid var(--accent);
      background: #eef7fc;
      border-radius: 0 7px 7px 0;
      padding: 12px 14px;
    }

    .callout.warn {
      border-left-color: var(--yellow);
      background: var(--yellow-soft);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .step {
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: 8px;
      padding: 12px;
    }

    .step strong {
      display: block;
      margin-bottom: 4px;
    }

    .step span {
      color: var(--muted);
      font-size: 13px;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .mini-table th,
    .mini-table td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    .mini-table th {
      background: #edf2f7;
    }

    .mini-table tr:last-child td {
      border-bottom: 0;
    }

    .editor {
      width: 100%;
      min-height: 190px;
      resize: vertical;
      border: 1px solid #b8c6d6;
      border-radius: 8px;
      background: var(--code);
      color: var(--code-ink);
      padding: 12px;
      font-family: Consolas, "Cascadia Code", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .options {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .option {
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: 7px;
      padding: 10px 11px;
      cursor: pointer;
      text-align: left;
    }

    .option:hover {
      border-color: #aebed0;
    }

    .option.correct {
      background: var(--green-soft);
      border-color: #a8d7c3;
    }

    .option.wrong {
      background: var(--red-soft);
      border-color: #e0b0b0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .feedback,
    .hint,
    .answer {
      border: 1px solid var(--line);
      background: #f3f6f9;
      color: #354254;
      border-radius: 7px;
      padding: 10px 12px;
      min-height: 42px;
    }

    .feedback.good {
      background: var(--green-soft);
      border-color: #a8d7c3;
      color: var(--green);
    }

    .feedback.bad {
      background: var(--red-soft);
      border-color: #e0b0b0;
      color: var(--red);
    }

    .hint,
    .answer {
      display: none;
      margin-top: 10px;
    }

    .footer-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .checkpoint {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    .check-row {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: start;
    }

    .check-row input {
      margin-top: 6px;
    }

    @media (max-width: 1040px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .practice {
        position: static;
      }

      .steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .main {
        padding: 18px 12px 36px;
      }

      .nav,
      .steps {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>4 小时 Python 读码训练营</h1>
        <p>先用小例子建立语法直觉，最后再回到 USB6363 项目。</p>
      </div>

      <div class="meter">
        <div class="meter-row">
          <span>完成关卡</span>
          <strong id="progressText">0 / 0</strong>
        </div>
        <div class="meter-track" aria-hidden="true">
          <div class="meter-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="time-block">
        <strong>建议节奏</strong><br>
        每节 8-12 分钟。先看例子，马上做题；卡住 2 分钟就点提示，别硬耗。
        <br><br>
        做完后看补充篇：<a href="python_reading_supplement.html">python_reading_supplement.html</a>
      </div>

      <div id="navRoot"></div>
    </aside>

    <main class="main">
      <section class="hero">
        <p class="kicker" id="lessonKicker">准备开始</p>
        <h2 id="lessonTitle">加载中</h2>
        <p id="lessonGoal"></p>
        <div class="toolbar">
          <button class="btn" id="prevBtn" type="button">上一关</button>
          <button class="btn primary" id="nextBtn" type="button">下一关</button>
          <button class="btn green" id="doneBtn" type="button">我理解了</button>
          <button class="btn" id="resetBtn" type="button">重置进度</button>
        </div>
      </section>

      <section class="grid">
        <article class="panel lesson">
          <div class="tags" id="tagRoot"></div>
          <div id="contentRoot"></div>
          <div class="footer-nav">
            <button class="btn" id="prevBtn2" type="button">上一关</button>
            <button class="btn primary" id="nextBtn2" type="button">下一关</button>
          </div>
        </article>

        <aside class="panel practice">
          <div id="practiceRoot"></div>
        </aside>
      </section>
    </main>
  </div>

  <script>
    const modules = [
      { name: "第 0-60 分钟：语法地基", lessons: [0, 1, 2, 3, 4, 5, 6, 7] },
      { name: "第 60-120 分钟：数据和判断", lessons: [8, 9, 10, 11, 12, 13, 14] },
      { name: "第 120-180 分钟：函数和工程基础", lessons: [15, 16, 17, 18, 19, 20, 21, 22] },
      { name: "第 180-240 分钟：对象和项目读码", lessons: [23, 24, 25, 26, 27, 28, 29, 30] }
    ];

    const lessons = [
      {
        title: "怎么用这 4 小时",
        minutes: 8,
        tags: ["学习方法", "读码策略"],
        goal: "知道今天不是背语法，而是建立读代码时的识别能力。",
        html: `
          <p>你上午读 Markdown 会累，是因为它一次给了太多知识点。今天换一个训练方式：每一关只学一个动作，马上做一个小题。</p>
          <div class="steps">
            <div class="step"><strong>1. 看例子</strong><span>先看能运行的最小片段。</span></div>
            <div class="step"><strong>2. 猜结果</strong><span>训练眼睛读代码。</span></div>
            <div class="step"><strong>3. 写 2-6 行</strong><span>只练本节动作。</span></div>
            <div class="step"><strong>4. 回到项目</strong><span>最后读 USB6363 代码。</span></div>
          </div>
          <h3>今天的合理目标</h3>
          <p>4 小时后，你不需要会写大型程序，但应该能读懂大部分 Python 语法：变量、字符串、列表、字典、条件、循环、函数、类、异常、import、JSON，以及项目里的调用链。</p>
          <div class="callout">
            <strong>重要：</strong>前 18 关都不用 6363 项目做例子。项目代码只在后面作为真实读码材料，避免一开始同时学硬件、HTTP、类、异常和类型提示。
          </div>
        `,
        quiz: {
          prompt: "遇到一个陌生 Python 文件，第一步最好做什么？",
          options: [
            ["找入口和主流程，不急着啃每个细节", true],
            ["从第一行开始把每个库都学完", false],
            ["先改代码试试能不能跑", false]
          ],
          explain: "先看入口和数据流，会比逐行硬啃轻松很多。"
        },
        practice: {
          kind: "checklist",
          title: "设定今天的练习节奏",
          task: "勾选后进入下一关。你不是来考试的，是来形成读码肌肉记忆。",
          items: [
            "每关最多卡 2 分钟，卡住就看提示。",
            "先理解小例子，再看项目代码。",
            "练习答案不唯一，能表达同一个意思就行。"
          ]
        }
      },
      {
        title: "程序从上到下执行",
        minutes: 6,
        tags: ["顺序执行", "print", "注释"],
        goal: "理解 Python 默认按顺序执行，注释不会运行。",
        html: `
          <p>Python 最基本的规则：从上往下，一行一行执行。</p>
          <pre class="code">print("start")\nprint("read ai0")\nprint("done")</pre>
          <p><code>#</code> 后面的内容是注释，给人看，不会执行。</p>
          <pre class="code"># 这行不会运行\nprint("这行会运行")</pre>
          <h3>为什么这很重要</h3>
          <p>读代码时先看顺序。除非遇到 <code>if</code>、<code>for</code>、函数调用、异常等结构，否则 Python 就是从上往下走。</p>
        `,
        quiz: {
          prompt: "下面代码输出几行？\n# print(\"A\")\nprint(\"B\")",
          options: [["1 行", true], ["2 行", false], ["0 行", false]],
          explain: "# 后面的 print 是注释，不会执行。"
        },
        practice: {
          kind: "code",
          title: "写两行输出",
          task: "写两行 print：第一行输出 start，第二行输出 done。",
          starter: "",
          checks: [
            ["print\\s*\\(\\s*[\"']start[\"']\\s*\\)", "需要 print(\"start\")。"],
            ["print\\s*\\(\\s*[\"']done[\"']\\s*\\)", "需要 print(\"done\")。"]
          ],
          hint: "print 后面是括号，字符串要放在引号里。",
          answer: "print(\"start\")\nprint(\"done\")"
        }
      },
      {
        title: "变量：给值起名字",
        minutes: 7,
        tags: ["变量", "赋值", "命名"],
        goal: "能看懂 name = value，并知道右边先算，左边保存。",
        html: `
          <p>变量是给一个值起名字。等号不是数学里的“永远相等”，而是“把右边的值放进左边的名字”。</p>
          <pre class="code">channel = "ai0"\nsamples = 1\nvoltage = 1.23</pre>
          <p>变量可以重新赋值：</p>
          <pre class="code">value = 1\nvalue = value + 1\nprint(value)  # 2</pre>
          <table class="mini-table">
            <tr><th>写法</th><th>意思</th></tr>
            <tr><td><code>x = 10</code></td><td>把 10 保存到 x。</td></tr>
            <tr><td><code>x = x + 1</code></td><td>先取旧 x，加 1，再存回 x。</td></tr>
            <tr><td><code>channel_name</code></td><td>多个单词常用下划线。</td></tr>
          </table>
        `,
        quiz: {
          prompt: "执行后 x 是多少？\nx = 3\nx = x + 2",
          options: [["5", true], ["3", false], ["x + 2", false]],
          explain: "第二行先取旧的 x，也就是 3，再加 2。"
        },
        practice: {
          kind: "code",
          title: "保存一个通道名",
          task: "定义 channel 为 ai0，定义 samples 为 10，然后打印 channel。",
          starter: "",
          checks: [
            ["channel\\s*=\\s*[\"']ai0[\"']", "需要 channel = \"ai0\"。"],
            ["samples\\s*=\\s*10", "需要 samples = 10。"],
            ["print\\s*\\(\\s*channel\\s*\\)", "需要 print(channel)。"]
          ],
          hint: "字符串 ai0 要加引号，数字 10 不需要。",
          answer: "channel = \"ai0\"\nsamples = 10\nprint(channel)"
        }
      },
      {
        title: "数字：int、float 和运算",
        minutes: 7,
        tags: ["int", "float", "运算"],
        goal: "分清整数、小数和常见运算符。",
        html: `
          <p>Python 里常见数字有两类：<code>int</code> 是整数，<code>float</code> 是小数。</p>
          <pre class="code">samples = 100      # int\nrate = 1000.0      # float\nseconds = samples / rate</pre>
          <table class="mini-table">
            <tr><th>运算符</th><th>意思</th><th>例子</th></tr>
            <tr><td><code>+</code></td><td>加</td><td><code>1 + 2</code></td></tr>
            <tr><td><code>-</code></td><td>减</td><td><code>5 - 3</code></td></tr>
            <tr><td><code>*</code></td><td>乘</td><td><code>2 * 4</code></td></tr>
            <tr><td><code>/</code></td><td>除，结果通常是小数</td><td><code>5 / 2</code> 得到 <code>2.5</code></td></tr>
          </table>
          <div class="callout">读硬件代码时，采样率、电压、超时时间通常是 float；采样点数通常是 int。</div>
        `,
        quiz: {
          prompt: "samples = 100\nrate = 1000.0\nseconds = samples / rate\nseconds 是多少？",
          options: [["0.1", true], ["10", false], ["100000", false]],
          explain: "100 / 1000.0 = 0.1。"
        },
        practice: {
          kind: "code",
          title: "计算采样时长",
          task: "定义 samples = 500，rate = 1000.0，计算 seconds = samples / rate。",
          starter: "",
          checks: [
            ["samples\\s*=\\s*500", "需要 samples = 500。"],
            ["rate\\s*=\\s*1000\\.0", "需要 rate = 1000.0。"],
            ["seconds\\s*=\\s*samples\\s*/\\s*rate", "需要 seconds = samples / rate。"]
          ],
          hint: "先保存两个变量，再用它们相除。",
          answer: "samples = 500\nrate = 1000.0\nseconds = samples / rate"
        }
      },
      {
        title: "字符串：文本和方法",
        minutes: 7,
        tags: ["str", "方法", "清洗输入"],
        goal: "知道字符串是文本，并能看懂 strip、upper、lower、rstrip。",
        html: `
          <p>字符串就是文本，用引号包起来。</p>
          <pre class="code">channel = "ai0"\nline = "PFI0"\nbase_url = "http://127.0.0.1:8765"</pre>
          <p>字符串有很多方法。方法就是跟在值后面的动作。</p>

          <p>这段不是高级魔法，就是你已经学过的：函数、默认参数、if、raise、方法调用、关键字参数。</p>
          <div class="callout">读底层代码时，先把硬件库调用暂时折叠起来。先看它如何检查输入、准备变量、返回结果。</div>
        `,
        quiz: {
          prompt: "physical_channel = self._normalize_channel(channel, kind=\"ai\") 这一行主要在做什么？",
          options: [["把用户传的通道名统一成底层需要的格式", true], ["直接读取电压", false], ["启动 HTTP 服务", false]],
          explain: "normalize 这类名字通常表示校验和统一格式。"
        },
        practice: {
          kind: "code",
          title: "写一个简化版通道规范化",
          task: "定义 normalize_ai(channel)，如果 channel == \"ai0\"，返回 \"Dev2/ai0\"。",
          starter: "",
          checks: [
            ["def\\s+normalize_ai\\s*\\(\\s*channel\\s*\\)\\s*:", "需要 def normalize_ai(channel):。"],
            ["if\\s+channel\\s*==\\s*[\"']ai0[\"']\\s*:", "需要 if channel == \"ai0\":。"],
            ["return\\s+[\"']Dev2/ai0[\"']", "需要 return \"Dev2/ai0\"。"]
          ],
          hint: "这只是简化练习，真实项目支持更多通道。",
          answer: "def normalize_ai(channel):\n    if channel == \"ai0\":\n        return \"Dev2/ai0\""
        }
      },
      {
        title: "标准脚本入口",
        minutes: 7,
        tags: ["main", "__name__", "入口"],
        goal: "能写出项目脚本的标准结构。",
        html: `
          <p>项目脚本建议都写成这种结构：</p>
          <pre class="code">def main() -> int:\n    print(\"work\")\n    return 0\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())</pre>
          <p>这样这个文件被直接运行时会执行 <code>main()</code>；被别的文件 import 时不会自动执行。</p>
          <p><code>return 0</code> 通常表示正常结束。</p>
        `,
        quiz: {
          prompt: "if __name__ == \"__main__\" 的作用是？",
          options: [["只在文件被直接运行时执行入口代码", true], ["定义一个变量", false], ["捕获异常", false]],
          explain: "这是 Python 脚本常见入口保护。"
        },
        practice: {
          kind: "code",
          title: "写标准入口",
          task: "写一个 main() -> int，打印 ready，return 0，并加标准入口判断。",
          starter: "",
          checks: [
            ["def\\s+main\\s*\\(\\s*\\)\\s*->\\s*int\\s*:", "需要 def main() -> int:。"],
            ["print\\s*\\(\\s*[\"']ready[\"']\\s*\\)", "需要 print(\"ready\")。"],
            ["return\\s+0", "需要 return 0。"],
            ["if\\s+__name__\\s*==\\s*[\"']__main__[\"']\\s*:", "需要 if __name__ == \"__main__\":。"],
            ["raise\\s+SystemExit\\s*\\(\\s*main\\s*\\(\\s*\\)\\s*\\)", "需要 raise SystemExit(main())。"]
          ],
          hint: "入口判断放在文件最后。",
          answer: "def main() -> int:\n    print(\"ready\")\n    return 0\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())"
        }
      },
      {
        title: "最终闯关：读 AI 并判断",
        minutes: 16,
        tags: ["综合", "真实脚本", "4 小时收束"],
        goal: "把 import、main、对象、字典、if、f-string 串成一个小脚本。",
        html: `
          <p>最后写一个真实风格的小脚本：读取 ai0，如果大于 1V 打印 high，否则打印 normal。</p>
          <h3>拆成动作</h3>
          <ol>
            <li>导入 <code>Usb6363Client</code>。</li>
            <li>定义 <code>main() -> int</code>。</li>
            <li>创建 <code>daq</code>。</li>
            <li>调用 <code>daq.read_ai(channel="ai0")</code>。</li>
            <li>从 <code>result["values"]</code> 取电压。</li>
            <li>用 <code>if voltage > 1.0</code> 判断。</li>
            <li>最后 <code>return 0</code>，写标准入口。</li>
          </ol>
          <div class="callout">
            如果你能独立写出这个脚本，说明今天最关键的 Python 读码基础已经串起来了。
          </div>
        `,
        quiz: {
          prompt: "这个综合脚本里，daq.read_ai(...) 返回的 result 最像什么类型？",
          options: [["dict 字典", true], ["class 类定义", false], ["import 语句", false]],
          explain: "客户端方法返回的是解析后的 JSON，也就是 Python 字典。"
        },
        practice: {
          kind: "code",
          title: "写完整小脚本",
          task: "按左边步骤写完整脚本。检查器只做静态检查，不会真的访问硬件。",
          starter: "from usb6363_client import Usb6363Client\n\n\n",
          checks: [
            ["from\\s+usb6363_client\\s+import\\s+Usb6363Client", "需要导入 Usb6363Client。"],
            ["def\\s+main\\s*\\(\\s*\\)\\s*->\\s*int\\s*:", "需要定义 main() -> int。"],
            ["daq\\s*=\\s*Usb6363Client\\s*\\(", "需要创建 daq。"],
            ["result\\s*=\\s*daq\\.read_ai\\s*\\(\\s*channel\\s*=\\s*[\"']ai0[\"']\\s*\\)", "需要读取 ai0。"],
            ["voltage\\s*=\\s*result\\s*\\[\\s*[\"']values[\"']\\s*\\]", "需要 voltage = result[\"values\"]。"],
            ["if\\s+voltage\\s*>\\s*1\\.0\\s*:", "需要 if voltage > 1.0:。"],
            ["print\\s*\\(\\s*[\"']high[\"']\\s*\\)", "超过阈值时打印 high。"],
            ["else\\s*:", "需要 else:。"],
            ["print\\s*\\(\\s*[\"']normal[\"']\\s*\\)", "否则打印 normal。"],
            ["return\\s+0", "main 需要 return 0。"],
            ["if\\s+__name__\\s*==\\s*[\"']__main__[\"']\\s*:", "需要标准入口判断。"],
            ["raise\\s+SystemExit\\s*\\(\\s*main\\s*\\(\\s*\\)\\s*\\)", "需要 raise SystemExit(main())。"]
          ],
          hint: "先写 main 里面的逻辑，再补最后两行入口。",
          answer: "from usb6363_client import Usb6363Client\n\n\ndef main() -> int:\n    daq = Usb6363Client()\n    result = daq.read_ai(channel=\"ai0\")\n    voltage = result[\"values\"]\n\n    if voltage > 1.0:\n        print(\"high\")\n    else:\n        print(\"normal\")\n\n    return 0\n\n\nif __name__ == \"__main__\":\n    raise SystemExit(main())"
        }
      }
    ];

    let current = Number(localStorage.getItem("py4.current") || 0);
    const done = new Set(JSON.parse(localStorage.getItem("py4.done") || "[]"));

    const navRoot = document.getElementById("navRoot");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const lessonKicker = document.getElementById("lessonKicker");
    const lessonTitle = document.getElementById("lessonTitle");
    const lessonGoal = document.getElementById("lessonGoal");
    const tagRoot = document.getElementById("tagRoot");
    const contentRoot = document.getElementById("contentRoot");
    const practiceRoot = document.getElementById("practiceRoot");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn2 = document.getElementById("prevBtn2");
    const nextBtn2 = document.getElementById("nextBtn2");
    const doneBtn = document.getElementById("doneBtn");
    const resetBtn = document.getElementById("resetBtn");

    function save() {
      localStorage.setItem("py4.current", String(current));
      localStorage.setItem("py4.done", JSON.stringify([...done]));
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderNav() {
      navRoot.innerHTML = modules.map((mod) => {
        const buttons = mod.lessons.map((idx) => {
          const lesson = lessons[idx];
          const isDone = done.has(idx);
          const active = idx === current;
          return `
            <button class="nav-btn ${isDone ? "done" : ""} ${active ? "active" : ""}" type="button" data-index="${idx}">
              <span class="nav-num">${isDone ? "✓" : idx + 1}</span>
              <span>${lesson.title}</span>
              <span class="nav-time">${lesson.minutes}m</span>
            </button>
          `;
        }).join("");
        return `<div class="nav-title">${mod.name}</div><nav class="nav">${buttons}</nav>`;
      }).join("");

      navRoot.querySelectorAll(".nav-btn").forEach((button) => {
        button.addEventListener("click", () => {
          current = Number(button.dataset.index);
          save();
          render();
        });
      });
    }

    function renderProgress() {
      progressText.textContent = `${done.size} / ${lessons.length}`;
      progressFill.style.width = `${Math.round((done.size / lessons.length) * 100)}%`;
    }

    function renderQuiz(lesson) {
      const q = lesson.quiz;
      return `
        <h3>先猜一下</h3>
        <p>${q.prompt.replace(/\n/g, "<br>")}</p>
        <div class="options">
          ${q.options.map((item, idx) => `
            <button class="option" type="button" data-correct="${item[1]}" data-option="${idx}">${item[0]}</button>
          `).join("")}
        </div>
        <div class="feedback" id="quizFeedback" style="margin-top:10px;">选一个答案，训练读代码直觉。</div>
      `;
    }

    function renderPractice(lesson) {
      const p = lesson.practice;
      if (p.kind === "checklist") {
        practiceRoot.innerHTML = `
          <h3>${p.title}</h3>
          <p>${p.task}</p>
          <div class="checkpoint">
            ${p.items.map((item, idx) => `
              <label class="check-row">
                <input type="checkbox" data-check="${idx}">
                <span>${item}</span>
              </label>
            `).join("")}
          </div>
          <div class="actions">
            <button class="btn green" id="checkPractice" type="button">完成本关</button>
          </div>
          <div class="feedback" id="practiceFeedback">全部勾选后点击完成。</div>
        `;
        document.getElementById("checkPractice").addEventListener("click", () => {
          const allChecked = [...practiceRoot.querySelectorAll("input[type='checkbox']")].every((box) => box.checked);
          const feedback = document.getElementById("practiceFeedback");
          if (!allChecked) {
            feedback.className = "feedback bad";
            feedback.textContent = "还有没勾选的项。";
            return;
          }
          markDone("完成。今天按这个节奏走就行。");
        });
        return;
      }

      practiceRoot.innerHTML = `
        <h3>${p.title}</h3>
        <p>${p.task}</p>
        <textarea class="editor" id="editor" spellcheck="false">${p.starter}</textarea>
        <div class="actions">
          <button class="btn green" id="checkPractice" type="button">检查代码</button>
          <button class="btn" id="hintBtn" type="button">提示</button>
          <button class="btn" id="answerBtn" type="button">参考答案</button>
        </div>
        <div class="feedback" id="practiceFeedback">写几行代码，然后点击检查。</div>
        <div class="hint" id="hintBox">${p.hint}</div>
        <div class="answer" id="answerBox"><strong>一种参考写法：</strong><pre class="code">${escapeHtml(p.answer)}</pre></div>
      `;

      document.getElementById("checkPractice").addEventListener("click", () => {
        const code = document.getElementById("editor").value;
        const failed = p.checks.find(([pattern]) => !(new RegExp(pattern, "s").test(code)));
        const feedback = document.getElementById("practiceFeedback");
        if (failed) {
          feedback.className = "feedback bad";
          feedback.textContent = failed[1];
          return;
        }
        markDone("通过。这个语法点可以进入下一关。");
      });

      document.getElementById("hintBtn").addEventListener("click", () => {
        const box = document.getElementById("hintBox");
        box.style.display = box.style.display === "block" ? "none" : "block";
      });

      document.getElementById("answerBtn").addEventListener("click", () => {
        const box = document.getElementById("answerBox");
        box.style.display = box.style.display === "block" ? "none" : "block";
      });
    }

    function bindQuiz(lesson) {
      document.querySelectorAll(".option").forEach((button) => {
        button.addEventListener("click", () => {
          const isCorrect = button.dataset.correct === "true";
          document.querySelectorAll(".option").forEach((option) => {
            option.classList.remove("wrong", "correct");
            if (option.dataset.correct === "true") option.classList.add("correct");
          });
          if (!isCorrect) button.classList.add("wrong");
          const feedback = document.getElementById("quizFeedback");
          feedback.className = `feedback ${isCorrect ? "good" : "bad"}`;
          feedback.textContent = isCorrect ? `答对了。${lesson.quiz.explain}` : `还差一点。${lesson.quiz.explain}`;
        });
      });
    }

    function markDone(message) {
      done.add(current);
      save();
      renderProgress();
      renderNav();
      doneBtn.textContent = "已完成";
      const feedback = document.getElementById("practiceFeedback");
      if (feedback) {
        feedback.className = "feedback good";
        feedback.textContent = message;
      }
    }

    function go(delta) {
      const next = current + delta;
      if (next < 0 || next >= lessons.length) return;
      current = next;
      save();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      const lesson = lessons[current];
      lessonKicker.textContent = `第 ${current + 1} 关 · 建议 ${lesson.minutes} 分钟`;
      lessonTitle.textContent = lesson.title;
      lessonGoal.textContent = lesson.goal;
      tagRoot.innerHTML = lesson.tags.map((tag, idx) => `<span class="tag ${idx % 2 ? "green" : ""}">${tag}</span>`).join("");
      contentRoot.innerHTML = lesson.html + renderQuiz(lesson);
      renderPractice(lesson);
      bindQuiz(lesson);
      renderNav();
      renderProgress();

      prevBtn.disabled = current === 0;
      prevBtn2.disabled = current === 0;
      nextBtn.disabled = current === lessons.length - 1;
      nextBtn2.disabled = current === lessons.length - 1;
      doneBtn.textContent = done.has(current) ? "已完成" : "我理解了";
    }

    prevBtn.addEventListener("click", () => go(-1));
    prevBtn2.addEventListener("click", () => go(-1));
    nextBtn.addEventListener("click", () => go(1));
    nextBtn2.addEventListener("click", () => go(1));
    doneBtn.addEventListener("click", () => markDone("已标记完成。"));
    resetBtn.addEventListener("click", () => {
      if (!confirm("确定重置进度吗？")) return;
      done.clear();
      current = 0;
      save();
      render();
    });

    render();
  </script>
</body>
</html>
